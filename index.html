<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f2f6f2;min-height:100vh;padding-bottom:80px}

/* ── Header ── */
.hdr{background:linear-gradient(160deg,#0d7a4e 0%,#128048 60%,#1a9a5a 100%);color:#fff;padding:env(safe-area-inset-top,14px) 16px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hdr-inner{display:flex;align-items:center;gap:11px;max-width:480px;margin:0 auto}
.hdr-icon{font-size:26px;line-height:1}
.hdr-text{flex:1}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:.3px}
.hdr-sub{font-size:12px;opacity:.75;margin-top:1px}
.hdr-count{background:rgba(255,255,255,.18);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;white-space:nowrap}

/* ── Tab bar ── */
.tabs{background:#fff;display:flex;border-bottom:1px solid #e4eae4;position:sticky;top:68px;z-index:90;max-width:480px;margin:0 auto}
@media(max-width:480px){.tabs{max-width:100%}}
.tab{flex:1;padding:12px 6px 10px;text-align:center;font-size:13px;color:#888;cursor:pointer;border-bottom:2.5px solid transparent;font-weight:500;transition:all .18s}
.tab.active{color:#128048;border-bottom-color:#128048;font-weight:700}

/* ── 搜尋 & 篩選 ── */
.search-wrap{max-width:480px;margin:0 auto;padding:10px 12px 6px;background:#f2f6f2}
.search-box{display:flex;align-items:center;background:#fff;border-radius:14px;border:1.5px solid #d8ead8;padding:0 12px;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.search-box input{flex:1;border:none;outline:none;font-size:15px;padding:10px 0;background:transparent;color:#222}
.search-box .icon{color:#aaa;font-size:16px}
.chips{display:flex;gap:6px;overflow-x:auto;padding:6px 0 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:20px;border:1.5px solid #c8dfc8;background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#555;font-weight:500;transition:all .15s;flex-shrink:0}
.chip.on{background:#128048;border-color:#128048;color:#fff;font-weight:700}

/* ── 總覽 notice ── */
.notice-bar{max-width:480px;margin:4px auto 0;padding:0 12px}
.notice{background:#fffbea;border-left:4px solid #f5a623;border-radius:0 10px 10px 0;padding:9px 12px;font-size:12px;color:#666;line-height:1.6}

/* ── 統計卡片行 ── */
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:480px;margin:10px auto 0;padding:0 12px}
.sum-card{background:#fff;border-radius:16px;padding:13px 14px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.sum-card .lbl{font-size:11px;color:#888;margin-bottom:5px;font-weight:500}
.sum-card .val{font-size:19px;font-weight:800;color:#128048;line-height:1.1;font-variant-numeric:tabular-nums}
.sum-card .val.warn{color:#e07b00}
.sum-card .val.hi{color:#c62828}
.sum-card .sub{font-size:10px;color:#bbb;margin-top:3px}

/* ── 結果數 ── */
.result-count{max-width:480px;margin:12px auto 0;padding:0 14px;font-size:13px;color:#888;font-weight:500}

/* ── 明細卡片 ── */
.cards{max-width:480px;margin:8px auto 0;padding:0 12px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:18px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);cursor:pointer;transition:box-shadow .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.98);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.card-code{font-size:15px;font-weight:800;color:#128048;font-family:monospace;letter-spacing:.5px}
.card-name{font-size:14px;color:#333;font-weight:600;flex:1;line-height:1.3}
.cat-badge{background:#eef7ee;color:#128048;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
.card-item .lbl{font-size:11px;color:#aaa;margin-bottom:2px}
.card-item .val{font-size:15px;font-weight:700;color:#222;font-variant-numeric:tabular-nums}
.card-item .val.blue{color:#1565c0}
.card-item .val.green{color:#128048}
.card-item .val.neg{color:#c62828}
.pct-row{margin-top:10px}
.pct-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.pct-label .name{color:#888}
.pct-label .pct{font-weight:700}
.pct-label .pct.ok{color:#128048}
.pct-label .pct.warn{color:#e07b00}
.pct-label .pct.hi{color:#c62828}
.bar-track{background:#f0f4f0;border-radius:6px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s}
.bar-fill.ok{background:linear-gradient(90deg,#128048,#34c274)}
.bar-fill.warn{background:linear-gradient(90deg,#e07b00,#f5a623)}
.bar-fill.hi{background:linear-gradient(90deg,#c62828,#e53935)}

/* ── 摘要Tab ── */
.summary-tab{max-width:480px;margin:10px auto 0;padding:0 12px;display:flex;flex-direction:column;gap:10px}
.sec-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.sec-hdr{background:#128048;color:#fff;padding:11px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f5f5}
.sec-row:last-child{border-bottom:none}
.sec-row .k{font-size:13px;color:#555}
.sec-row .v{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.sec-row .v.ok{color:#128048}
.sec-row .v.warn{color:#e07b00}
.sec-row .v.hi{color:#c62828}
.cat-bar-row{padding:10px 16px;border-bottom:1px solid #f5f5f5}
.cat-bar-row:last-child{border-bottom:none}
.cat-bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}

/* ── 高用率Tab ── */
.alert-tab{max-width:480px;margin:10px auto 0;padding:0 12px}

/* ── 分頁 ── */
.pager{max-width:480px;margin:14px auto 0;padding:0 12px;display:flex;align-items:center;justify-content:center;gap:12px}
.pager-btn{padding:8px 20px;border-radius:22px;border:1.5px solid #c8dfc8;background:#fff;font-size:14px;font-weight:700;color:#128048;cursor:pointer}
.pager-btn:disabled{opacity:.35;cursor:default}
.pager-info{font-size:13px;color:#888}

/* ── 詳情彈窗 ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:88vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,20px)}
.sheet-handle{width:38px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0}
.sheet-hdr{padding:16px 18px 12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:flex-start}
.sheet-title{font-size:17px;font-weight:800;color:#128048;line-height:1.3;max-width:80%}
.sheet-close{font-size:24px;color:#ccc;cursor:pointer;line-height:1;padding:0 4px}
.sheet-body{padding:14px 18px}
.detail-sec{margin-bottom:14px}
.detail-sec-title{font-size:11px;color:#aaa;font-weight:700;letter-spacing:.8px;margin-bottom:8px;text-transform:uppercase}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:#f8faf8;border-radius:12px;padding:10px 12px}
.detail-item .k{font-size:11px;color:#aaa;margin-bottom:3px}
.detail-item .v{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;color:#222}
.detail-item .v.blue{color:#1565c0}
.detail-item .v.green{color:#128048}
.detail-item .v.warn{color:#e07b00}
.detail-item .v.hi{color:#c62828}

/* ── Bottom tab bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.btab{flex:1;padding:8px 4px 6px;text-align:center;cursor:pointer;color:#aaa;font-size:11px;font-weight:500;transition:color .15s}
.btab .icon{font-size:22px;margin-bottom:2px}
.btab.active{color:#128048}

/* ── 空狀態 ── */
.empty{text-align:center;padding:50px 20px;color:#bbb}
.empty .eicon{font-size:52px;margin-bottom:12px}
</style>
</head>

const CAT_LABELS = {'A':'人事費','B':'業務外包','C':'業務成本','D':'專案建置成本','E':'設備及折舊','F':'管銷費用'};
const CAT_LIST   = Object.values(CAT_LABELS);
const PAGE = 20;

let S = { search:'', cat:'all', page:1, filtered:[] };

function fmt(v) {
  if (v===''||v===null||v===undefined) return '—';
  const n=Number(v); if(isNaN(n)) return v;
  return n.toLocaleString('zh-TW');
}
function fmtPct(v) {
  const n=Number(v); if(isNaN(n)) return '—';
  return n.toFixed(2)+'%';
}
function pctCls(v) {
  const n=Number(v);
  return n>=90?'hi':n>=70?'warn':'ok';
}

// ── 過濾 ────────────────────────────────────────────────
function filter() {
  let rows=RAW.slice();
  if (S.search) {
    const q=S.search.toLowerCase();
    rows=rows.filter(r=>r['明細帳'].toLowerCase().includes(q)||r['會計項目'].toLowerCase().includes(q));
  }
  if (S.cat!=='all') rows=rows.filter(r=>r['費用分類']===S.cat);
  S.filtered=rows; S.page=1;
}

// ── 統計卡片 ────────────────────────────────────────────
function renderStats() {
  const totalBgt  = RAW.reduce((s,r)=>s+(Number(r['本年度預算'])||0),0);
  const totalDisp = RAW.reduce((s,r)=>s+(Number(r['本月餘額'])||0),0);
  const totalLeft = RAW.reduce((s,r)=>s+(Number(r['剩餘可動支數'])||0),0);
  const totalMBgt = RAW.reduce((s,r)=>s+(Number(r['本月預算數'])||0),0);
  const el=document.getElementById('stat-cards');
  el.innerHTML=
    `<div class="sum-card"><div class="lbl">本月餘額（累計）</div><div class="val blue">${fmt(totalDisp)}</div></div>`+
    `<div class="sum-card"><div class="lbl">本月預算數</div><div class="val">${fmt(totalMBgt)}</div></div>`+
    `<div class="sum-card"><div class="lbl">本年度預算</div><div class="val">${fmt(totalBgt)}</div></div>`+
    `<div class="sum-card"><div class="lbl">剩餘可動支數</div><div class="val green">${fmt(totalLeft)}</div></div>`;
}

// ── 明細卡片 ────────────────────────────────────────────
function renderCards() {
  const el=document.getElementById('cards');
  const rc=document.getElementById('result-count');
  const total=S.filtered.length;
  rc.textContent='共 '+total+' 筆';
  document.getElementById('count-badge').textContent=total+' 筆';

  const start=(S.page-1)*PAGE;
  const rows=S.filtered.slice(start,start+PAGE);

  if(!rows.length){
    el.innerHTML='<div class="empty"><div class="eicon">🔍</div><div>找不到符合條件的資料</div></div>';
    document.getElementById('pager').innerHTML='';
    return;
  }

  el.innerHTML='';
  rows.forEach(function(r){
    const yr=Number(r['年度動支率']);
    const acr=Number(r['累計動支率']);
    const yrCls=pctCls(yr);
    const acrCls=pctCls(acr);

    const card=document.createElement('div');
    card.className='card';
    card.dataset.acc=r['明細帳'];
    card.innerHTML=
      `<div class="card-hdr">
        <div>
          <div class="card-code">${r['明細帳']}</div>
          <div class="card-name">${r['會計項目']}</div>
        </div>
        <div class="cat-badge">${r['費用分類']}</div>
      </div>
      <div class="card-grid">
        <div class="card-item"><div class="lbl">本月餘額（累計）</div><div class="val blue">${fmt(r['本月餘額'])}</div></div>
        <div class="card-item"><div class="lbl">累計動支率</div><div class="val ${acrCls}">${fmtPct(r['累計動支率'])}</div></div>
        <div class="card-item"><div class="lbl">本年度預算</div><div class="val">${fmt(r['本年度預算'])}</div></div>
        <div class="card-item"><div class="lbl">剩餘可動支數</div><div class="val ${Number(r['剩餘可動支數'])<0?'neg':'green'}">${fmt(r['剩餘可動支數'])}</div></div>
      </div>
      <div class="pct-row">
        <div class="pct-label"><span class="name">年度動支率</span><span class="pct ${yrCls}">${fmtPct(yr)}</span></div>
        <div class="bar-track"><div class="bar-fill ${yrCls}" style="width:${Math.min(100,yr)}%"></div></div>
      </div>`;
    card.addEventListener('click', function(){ openSheet(this.dataset.acc); });
    el.appendChild(card);
  });

  renderPager();
}

// ── 分頁 ────────────────────────────────────────────────
function renderPager() {
  const pg=document.getElementById('pager');
  const total=Math.ceil(S.filtered.length/PAGE);
  if(total<=1){pg.innerHTML='';return;}
  pg.innerHTML='';
  const prev=document.createElement('button');
  prev.className='pager-btn'; prev.textContent='◀ 上頁'; prev.disabled=S.page<=1;
  prev.addEventListener('click',function(){S.page--;renderCards();window.scrollTo(0,0);});
  const info=document.createElement('span');
  info.className='pager-info'; info.textContent=S.page+' / '+total;
  const next=document.createElement('button');
  next.className='pager-btn'; next.textContent='下頁 ▶'; next.disabled=S.page>=total;
  next.addEventListener('click',function(){S.page++;renderCards();window.scrollTo(0,0);});
  pg.appendChild(prev); pg.appendChild(info); pg.appendChild(next);
}

function renderChips() {
  const el=document.getElementById('chips');
  el.innerHTML='';
  ['all'].concat(CAT_LIST).forEach(function(c){
    const btn=document.createElement('button');
    btn.className='chip'+(S.cat===c?' on':'');
    btn.textContent=c==='all'?'全部':c;
    btn.dataset.cat=c;
    btn.addEventListener('click',function(){
      S.cat=this.dataset.cat; filter(); renderCards();
      document.querySelectorAll('.chip').forEach(function(b){b.className='chip'+(b.dataset.cat===S.cat?' on':'');});
    });
    el.appendChild(btn);
  });
}

// ── 搜尋 ────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',function(){
  S.search=this.value.trim(); filter(); renderCards();
});

// ── Tab 切換 ────────────────────────────────────────────
function switchTab(tabId){
  ['list','summary','alert','info'].forEach(function(t){
    document.getElementById('tab-'+t).style.display=t===tabId?'':'none';
  });
  document.querySelectorAll('.tab').forEach(function(t){
    t.className='tab'+(t.dataset.tab===tabId?' active':'');
  });
  document.querySelectorAll('.btab').forEach(function(t){
    t.className='btab'+(t.dataset.tab===tabId?' active':'');
  });
  if(tabId==='summary') renderSummary();
  if(tabId==='alert') renderAlert();
}

document.querySelectorAll('.tab,.btab').forEach(function(t){
  t.addEventListener('click',function(){switchTab(this.dataset.tab);});
});

// ── 費用摘要 ────────────────────────────────────────────
function renderSummary(){
  const el=document.getElementById('summary-content');
  if(el.dataset.rendered) return;
  el.dataset.rendered='1';

  const totalBgt  = RAW.reduce((s,r)=>s+(Number(r['本年度預算'])||0),0);
  const totalDisp = RAW.reduce((s,r)=>s+(Number(r['本月餘額'])||0),0);
  const totalLeft = RAW.reduce((s,r)=>s+(Number(r['剩餘可動支數'])||0),0);
  const ovPct = totalBgt>0?totalDisp/totalBgt*100:0;
  const ovCls = pctCls(ovPct);

  // 整體卡片
  const ov=document.createElement('div');
  ov.className='sec-card';
  ov.innerHTML=`<div class="sec-hdr">📈 整體預算概況</div>
    <div class="sec-row"><span class="k">本年度預算總計</span><span class="v">${fmt(totalBgt)}</span></div>
    <div class="sec-row"><span class="k">累計動支總計</span><span class="v ${ovCls}">${fmt(totalDisp)}</span></div>
    <div class="sec-row"><span class="k">整體動支率</span><span class="v ${ovCls}">${ovPct.toFixed(2)}%</span></div>
    <div class="sec-row"><span class="k">剩餘可動支總計</span><span class="v ${totalLeft<0?'hi':'ok'}">${fmt(totalLeft)}</span></div>`;
  el.appendChild(ov);

  // 各類別橫條
  const cat=document.createElement('div');
  cat.className='sec-card';
  let catHtml='<div class="sec-hdr">📂 費用分類動支率</div>';
  CAT_LIST.forEach(function(c){
    const rows=RAW.filter(r=>r['費用分類']===c);
    if(!rows.length) return;
    const bgt=rows.reduce((s,r)=>s+(Number(r['本年度預算'])||0),0);
    const disp=rows.reduce((s,r)=>s+(Number(r['本月餘額'])||0),0);
    const pct=bgt>0?Math.min(100,disp/bgt*100):0;
    const cls=pctCls(pct);
    catHtml+=`<div class="cat-bar-row">
      <div class="cat-bar-top"><span style="font-size:13px;font-weight:600;color:#333">${c}</span><span class="pct-label"><span class="pct ${cls}">${pct.toFixed(1)}%</span></span></div>
      <div style="font-size:11px;color:#aaa;margin-bottom:5px">${rows.length}筆　年度預算 ${fmt(bgt)}</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
  });
  cat.innerHTML=catHtml;
  el.appendChild(cat);
}

// ── 高用率預警 ───────────────────────────────────────────
function renderAlert(){
  const el=document.getElementById('alert-content');
  if(el.dataset.rendered) return;
  el.dataset.rendered='1';

  const hiRows=RAW.filter(r=>Number(r['年度動支率'])>=70)
    .sort((a,b)=>Number(b['年度動支率'])-Number(a['年度動支率']));

  if(!hiRows.length){
    el.innerHTML='<div class="empty"><div class="eicon">✅</div><div>目前無高用率項目</div></div>';
    return;
  }

  const wrap=document.createElement('div');
  wrap.className='sec-card';
  let html=`<div class="sec-hdr">⚠️ 年度動支率 ≥ 70%（${hiRows.length} 筆）</div>`;
  hiRows.forEach(function(r){
    const yr=Number(r['年度動支率']);
    const cls=pctCls(yr);
    html+=`<div class="cat-bar-row" style="cursor:pointer" data-acc="${r['明細帳']}">
      <div class="cat-bar-top">
        <span><strong style="color:#128048">${r['明細帳']}</strong> ${r['會計項目']}</span>
        <span class="pct ${cls}">${yr.toFixed(2)}%</span>
      </div>
      <div style="font-size:11px;color:#aaa;margin-bottom:5px">剩餘可動支：${fmt(r['剩餘可動支數'])} 元</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${Math.min(100,yr)}%"></div></div>
    </div>`;
  });
  wrap.innerHTML=html;
  wrap.querySelectorAll('[data-acc]').forEach(function(row){
    row.addEventListener('click',function(){openSheet(this.dataset.acc);});
  });
  el.appendChild(wrap);
}

// ── 詳情彈窗 ────────────────────────────────────────────
function openSheet(acc){
  const r=RAW.find(x=>x['明細帳']===acc);
  if(!r) return;
  document.getElementById('sheet-title').textContent=r['明細帳']+'  '+r['會計項目'];
  const body=document.getElementById('sheet-body');
  const yr=Number(r['年度動支率']);
  const acr=Number(r['累計動支率']);
  body.innerHTML=`
    <div class="detail-sec">
      <div class="detail-sec-title">費用分類</div>
      <div style="display:inline-block;background:#eef7ee;color:#128048;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px">${r['費用分類']}</div>
    </div>
    <div class="detail-sec">
      <div class="detail-sec-title">本月數據</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="k">本月餘額（累計）</div><div class="v blue">${fmt(r['本月餘額'])}</div></div>
        <div class="detail-item"><div class="k">本月動支數</div><div class="v">${fmt(r['本月動支數'])}</div></div>
        <div class="detail-item"><div class="k">本月預算數</div><div class="v">${fmt(r['本月預算數'])}</div></div>
        <div class="detail-item"><div class="k">至本月預算數累計</div><div class="v">${fmt(r['至本月預算數累計'])}</div></div>
      </div>
    </div>
    <div class="detail-sec">
      <div class="detail-sec-title">年度數據</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="k">本年度預算</div><div class="v">${fmt(r['本年度預算'])}</div></div>
        <div class="detail-item"><div class="k">剩餘可動支數</div><div class="v ${Number(r['剩餘可動支數'])<0?'hi':'green'}">${fmt(r['剩餘可動支數'])}</div></div>
        <div class="detail-item"><div class="k">累計動支率</div><div class="v ${pctCls(acr)}">${fmtPct(acr)}</div></div>
        <div class="detail-item"><div class="k">年度動支率</div><div class="v ${pctCls(yr)}">${fmtPct(yr)}</div></div>
      </div>
    </div>
    <div class="detail-sec">
      <div class="detail-sec-title">年度動支進度</div>
      <div class="pct-row">
        <div class="pct-label"><span class="name">年度動支率</span><span class="pct ${pctCls(yr)}">${fmtPct(yr)}</span></div>
        <div class="bar-track" style="height:10px"><div class="bar-fill ${pctCls(yr)}" style="width:${Math.min(100,yr)}%"></div></div>
      </div>
    </div>`;
  document.getElementById('overlay').className='overlay open';
}

document.getElementById('sheet-close').addEventListener('click',function(){
  document.getElementById('overlay').className='overlay';
});
document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this) this.className='overlay';
});

// ── 產生時間 ────────────────────────────────────────────
document.getElementById('gen-time').textContent=new Date().toLocaleString('zh-TW');

// ── 初始化 ──────────────────────────────────────────────
filter();
renderStats();
renderChips();
renderCards();
</script>
</body>
