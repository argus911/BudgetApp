<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f0;min-height:100vh}
#app{max-width:900px;margin:0 auto;padding:0}

/* Header */
.hdr{background:linear-gradient(135deg,#0c6944,#128048);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr-icon{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:.5px}
.hdr-sub{font-size:12px;opacity:.8;margin-top:1px}
.hdr-badge{margin-left:auto;background:rgba(255,255,255,.2);border-radius:12px;padding:3px 10px;font-size:12px;font-weight:600}

/* 統計卡片 */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 12px 4px}
.stat-card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-label{font-size:11px;color:#666;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:700;color:#0c6944}
.stat-val.warn{color:#e85d04}
.stat-sub{font-size:10px;color:#999;margin-top:2px}

/* Tab Bar */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8ede8;position:sticky;top:68px;z-index:90;overflow-x:auto}
.tab{flex:1;min-width:72px;padding:10px 4px 8px;text-align:center;font-size:12px;color:#666;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .2s}
.tab.active{color:#0c6944;border-bottom-color:#0c6944;font-weight:700}

/* 搜尋 & 篩選 */
.search-bar{padding:10px 12px 6px;background:#f0f4f0}
.search-input{width:100%;padding:10px 14px;border:1px solid #cde0cd;border-radius:12px;font-size:15px;background:#fff;outline:none}
.search-input:focus{border-color:#128048;box-shadow:0 0 0 3px rgba(18,128,72,.12)}
.filter-row{display:flex;gap:6px;margin-top:6px;overflow-x:auto;padding-bottom:2px}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid #cde0cd;background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#444;transition:all .15s}
.chip.active{background:#128048;border-color:#128048;color:#fff;font-weight:600}

/* 表格 */
.table-wrap{overflow-x:auto;padding:0 0 80px}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
thead tr{background:#0c6944;color:#fff;position:sticky;top:112px;z-index:80}
th{padding:10px 8px;text-align:right;font-weight:600;font-size:12px;white-space:nowrap;cursor:pointer;user-select:none}
th:first-child,th:nth-child(2){text-align:left}
th .sort-arrow{margin-left:3px;opacity:.6;font-size:10px}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:hover{background:#f5faf5}
tbody tr.high-use{background:#fff5f0}
tbody tr.high-use:hover{background:#fee8e0}
td{padding:9px 8px;text-align:right;color:#333}
td:first-child{text-align:left;font-weight:600;color:#0c6944;font-family:monospace;font-size:12px}
td:nth-child(2){text-align:left;color:#333;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pct-cell{font-weight:700}
.pct-ok{color:#128048}
.pct-warn{color:#e85d04}
.pct-hi{color:#c62828}
.num{font-variant-numeric:tabular-nums}

/* 摘要頁 */
.section-card{background:#fff;margin:8px 12px;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.section-hdr{background:#0c6944;color:#fff;padding:10px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-body{padding:0}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f0f0}
.sum-row:last-child{border-bottom:none}
.sum-label{font-size:13px;color:#555}
.sum-val{font-size:14px;font-weight:700;color:#0c6944;font-variant-numeric:tabular-nums}
.sum-val.warn{color:#e85d04}
.sum-val.hi{color:#c62828}

/* Bar chart */
.bar-row{padding:8px 14px;border-bottom:1px solid #f0f0f0}
.bar-label{font-size:12px;color:#444;margin-bottom:4px;display:flex;justify-content:space-between}
.bar-track{background:#e8f0e8;border-radius:6px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#128048,#34b278);transition:width .4s}
.bar-fill.warn{background:linear-gradient(90deg,#e85d04,#ff8c00)}
.bar-fill.hi{background:linear-gradient(90deg,#c62828,#e53935)}

/* 注意事項 */
.notice{background:#fff8e1;border-left:4px solid #f9a825;margin:8px 12px;padding:10px 12px;border-radius:0 8px 8px 0;font-size:12px;color:#555;line-height:1.6}

/* 空狀態 */
.empty{text-align:center;padding:40px 20px;color:#999}
.empty-icon{font-size:48px;margin-bottom:12px}

/* 分頁 */
.pager{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-top:1px solid #eee}
.pager-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #cde0cd;background:#fff;font-size:13px;cursor:pointer;color:#0c6944;font-weight:600}
.pager-btn:disabled{opacity:.4;cursor:default}
.pager-info{font-size:13px;color:#666}

/* 詳情彈窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:0 0 40px}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0}
.modal-hdr{padding:16px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:16px;font-weight:700;color:#0c6944}
.modal-close{font-size:22px;color:#999;cursor:pointer;line-height:1}
.modal-body{padding:14px 16px}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f8f8f8}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:13px;color:#666}
.detail-val{font-size:13px;font-weight:600;color:#222;font-variant-numeric:tabular-nums;text-align:right;max-width:55%}
.detail-pct{font-size:14px;font-weight:700}
</style>
</head>

const META = {year:'115',month:'4'};

// 欄位定義
const COLS = [
  {key:'明細帳',        lb:'明細帳',       fmt:'str',  color:''},
  {key:'會計項目',      lb:'會計項目',     fmt:'str',  color:''},
  {key:'本月動支數',    lb:'本月動支',     fmt:'num',  color:''},
  {key:'本月餘額',      lb:'本月餘額(累)',  fmt:'num',  color:'blue'},
  {key:'本月預算數',    lb:'本月預算',     fmt:'num',  color:''},
  {key:'至本月預算數累計',lb:'累計預算',   fmt:'num',  color:''},
  {key:'累計動支率',    lb:'累計動支率%',  fmt:'pct',  color:''},
  {key:'本年度預算',    lb:'年度預算',     fmt:'num',  color:''},
  {key:'年度動支率',    lb:'年度動支率%',  fmt:'pct',  color:''},
  {key:'剩餘可動支數',  lb:'剩餘可動支',   fmt:'num',  color:'green'},
  {key:'費用分類',      lb:'費用分類',     fmt:'str',  color:''},
];

const CAT_LABELS = {'A':'人事費','B':'業務外包','C':'業務成本','D':'專案建置成本','E':'設備及折舊','F':'管銷費用'};
const PAGE_SIZE = 30;

let state = {
  tab: 'list',
  search: '',
  cat: 'all',
  sortKey: '明細帳',
  sortDir: 1,
  page: 1,
  filtered: [],
};

// ── 格式化數字 ──────────────────────────────────────────
function fmtNum(v) {
  if (v === '' || v === null || v === undefined) return '—';
  const n = Number(v);
  if (isNaN(n)) return v;
  return n.toLocaleString('zh-TW');
}
function fmtPct(v) {
  if (v === '' || v === null || v === undefined) return '—';
  const n = Number(v);
  if (isNaN(n)) return v;
  return n.toFixed(2) + '%';
}
function pctClass(v) {
  const n = Number(v);
  if (isNaN(n)) return '';
  if (n >= 90) return 'pct-hi';
  if (n >= 70) return 'pct-warn';
  return 'pct-ok';
}

// ── 過濾 & 排序 ─────────────────────────────────────────
function applyFilter() {
  let rows = RAW.slice();
  if (state.search) {
    const q = state.search.toLowerCase();
    rows = rows.filter(r =>
      r['明細帳'].toLowerCase().includes(q) ||
      r['會計項目'].toLowerCase().includes(q) ||
      r['費用分類'].includes(q)
    );
  }
  if (state.cat !== 'all') {
    rows = rows.filter(r => r['費用分類'] === state.cat);
  }
  rows.sort((a,b) => {
    let av = a[state.sortKey], bv = b[state.sortKey];
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * state.sortDir;
    return String(av).localeCompare(String(bv)) * state.sortDir;
  });
  state.filtered = rows;
  state.page = 1;
}

// ── 渲染表頭 ────────────────────────────────────────────
function renderHead() {
  var tr = document.getElementById('table-head');
  tr.innerHTML = '';
  COLS.forEach(function(c) {
    var th = document.createElement('th');
    var arrow = (state.sortKey === c.key) ? (state.sortDir === 1 ? ' ▲' : ' ▼') : '';
    th.innerHTML = c.lb + '<span class="sort-arrow">' + arrow + '</span>';
    th.dataset.colkey = c.key;
    th.addEventListener('click', function() {
      var k = this.dataset.colkey;
      if (state.sortKey === k) state.sortDir *= -1;
      else { state.sortKey = k; state.sortDir = 1; }
      applyFilter();
      renderTable();
    });
    tr.appendChild(th);
  });
}

// ── 渲染表格 ────────────────────────────────────────────
function renderTable() {
  renderHead();
  var tb = document.getElementById('table-body');
  tb.innerHTML = '';
  var start = (state.page - 1) * PAGE_SIZE;
  var pageRows = state.filtered.slice(start, start + PAGE_SIZE);

  if (pageRows.length === 0) {
    var tr = document.createElement('tr');
    var td = document.createElement('td');
    td.colSpan = COLS.length;
    td.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>找不到符合條件的資料</div></div>';
    tr.appendChild(td);
    tb.appendChild(tr);
  } else {
    pageRows.forEach(function(row) {
      var tr = document.createElement('tr');
      var yr = Number(row['年度動支率']);
      if (yr >= 80) tr.className = 'high-use';
      tr.dataset.acc = row['明細帳'];
      tr.style.cursor = 'pointer';
      tr.addEventListener('click', function() { openModal(this.dataset.acc); });

      COLS.forEach(function(c) {
        var td = document.createElement('td');
        td.className = 'num';
        var v = row[c.key];
        if (c.fmt === 'pct') {
          td.className += ' pct-cell ' + pctClass(v);
          td.textContent = fmtPct(v);
        } else if (c.fmt === 'num') {
          td.textContent = fmtNum(v);
          if (c.color === 'green' && Number(v) < 0) td.style.color = '#c62828';
        } else {
          td.textContent = v || '—';
          td.className = '';
        }
        tr.appendChild(td);
      });
      tb.appendChild(tr);
    });
  }

  renderPager();
  document.getElementById('record-count').textContent = state.filtered.length + ' 筆';
}

// ── 分頁 ────────────────────────────────────────────────
function renderPager() {
  var pg = document.getElementById('pager');
  var total = Math.ceil(state.filtered.length / PAGE_SIZE);
  if (total <= 1) { pg.innerHTML = ''; return; }
  pg.innerHTML = '';
  var prev = document.createElement('button');
  prev.className = 'pager-btn';
  prev.textContent = '◀ 上頁';
  prev.disabled = state.page <= 1;
  prev.addEventListener('click', function() { state.page--; renderTable(); window.scrollTo(0,0); });
  var info = document.createElement('span');
  info.className = 'pager-info';
  info.textContent = state.page + ' / ' + total;
  var next = document.createElement('button');
  next.className = 'pager-btn';
  next.textContent = '下頁 ▶';
  next.disabled = state.page >= total;
  next.addEventListener('click', function() { state.page++; renderTable(); window.scrollTo(0,0); });
  pg.appendChild(prev);
  pg.appendChild(info);
  pg.appendChild(next);
}

// ── 費用分類 Chips ──────────────────────────────────────
function renderChips() {
  var el = document.getElementById('cat-chips');
  el.innerHTML = '';
  var cats = ['all'].concat(Object.values(CAT_LABELS));
  cats.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (state.cat === c ? ' active' : '');
    btn.textContent = c === 'all' ? '全部' : c;
    btn.dataset.catval = c;
    btn.addEventListener('click', function() {
      state.cat = this.dataset.catval;
      applyFilter();
      renderTable();
      document.querySelectorAll('.chip').forEach(function(b) {
        b.className = 'chip' + (b.dataset.catval === state.cat ? ' active' : '');
      });
    });
    el.appendChild(btn);
  });
}

// ── 搜尋 ────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  state.search = this.value.trim();
  applyFilter();
  renderTable();
});

// ── Tab 切換 ────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    var tabId = this.dataset.tab;
    state.tab = tabId;
    document.querySelectorAll('.tab').forEach(function(x) { x.className = 'tab'; });
    this.className = 'tab active';
    document.querySelectorAll('.tab-content').forEach(function(x) { x.style.display = 'none'; });
    document.getElementById('tab-' + tabId).style.display = '';
    if (tabId === 'summary') renderSummary();
    if (tabId === 'alert') renderAlert();
  });
});

// ── 摘要頁 ──────────────────────────────────────────────
function renderSummary() {
  var el = document.getElementById('tab-summary');
  el.innerHTML = '';

  // 統計卡片
  var totalBgt  = RAW.reduce(function(s,r) { return s + (Number(r['本年度預算'])||0); }, 0);
  var totalDisp = RAW.reduce(function(s,r) { return s + (Number(r['本月餘額'])||0); }, 0);
  var totalLeft = RAW.reduce(function(s,r) { return s + (Number(r['剩餘可動支數'])||0); }, 0);
  var totalMBgt = RAW.reduce(function(s,r) { return s + (Number(r['本月預算數'])||0); }, 0);
  var totalMDisp= RAW.reduce(function(s,r) { return s + (Number(r['本月動支數'])||0); }, 0);
  var overallPct = totalBgt > 0 ? (totalDisp / totalBgt * 100) : 0;

  var grid = document.createElement('div');
  grid.className = 'stats-grid';
  grid.innerHTML =
    '<div class="stat-card"><div class="stat-label">本年度預算總計</div><div class="stat-val">' + fmtNum(totalBgt) + '</div><div class="stat-sub">元</div></div>' +
    '<div class="stat-card"><div class="stat-label">累計動支總計</div><div class="stat-val ' + (overallPct>=80?'warn':'') + '">' + fmtNum(totalDisp) + '</div><div class="stat-sub">' + overallPct.toFixed(1) + '% 動支率</div></div>' +
    '<div class="stat-card"><div class="stat-label">剩餘可動支總計</div><div class="stat-val ' + (totalLeft<0?'warn':'') + '">' + fmtNum(totalLeft) + '</div><div class="stat-sub">元</div></div>' +
    '<div class="stat-card"><div class="stat-label">本月動支合計</div><div class="stat-val">' + fmtNum(totalMDisp) + '</div><div class="stat-sub">本月預算 ' + fmtNum(totalMBgt) + '</div></div>';
  el.appendChild(grid);

  // 各費用分類統計
  var catCard = document.createElement('div');
  catCard.className = 'section-card';
  catCard.innerHTML = '<div class="section-hdr">📂 費用分類動支率</div><div class="section-body" id="cat-bars"></div>';
  el.appendChild(catCard);

  var catBars = catCard.querySelector('#cat-bars');
  Object.values(CAT_LABELS).forEach(function(cat) {
    var rows = RAW.filter(function(r) { return r['費用分類'] === cat; });
    if (!rows.length) return;
    var bgt  = rows.reduce(function(s,r) { return s + (Number(r['本年度預算'])||0); }, 0);
    var disp = rows.reduce(function(s,r) { return s + (Number(r['本月餘額'])||0); }, 0);
    var pct  = bgt > 0 ? Math.min(100, disp / bgt * 100) : 0;
    var cls  = pct >= 90 ? 'hi' : (pct >= 70 ? 'warn' : '');
    var div = document.createElement('div');
    div.className = 'bar-row';
    div.innerHTML =
      '<div class="bar-label"><span>' + cat + ' (' + rows.length + '筆)</span><span class="' + (cls?'pct-'+cls:'') + '">' + pct.toFixed(1) + '%</span></div>' +
      '<div class="bar-track"><div class="bar-fill ' + cls + '" style="width:' + pct + '%"></div></div>';
    catBars.appendChild(div);
  });
}

// ── 高用率預警頁 ────────────────────────────────────────
function renderAlert() {
  var el = document.getElementById('tab-alert');
  el.innerHTML = '';

  var hiRows = RAW.filter(function(r) { return Number(r['年度動支率']) >= 70; });
  hiRows.sort(function(a,b) { return Number(b['年度動支率']) - Number(a['年度動支率']); });

  if (!hiRows.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><div>目前無高用率項目</div></div>';
    return;
  }

  var card = document.createElement('div');
  card.className = 'section-card';
  card.innerHTML = '<div class="section-hdr">⚠️ 年度動支率 ≥ 70% 項目（' + hiRows.length + ' 筆）</div><div class="section-body" id="alert-list"></div>';
  el.appendChild(card);

  var lst = card.querySelector('#alert-list');
  hiRows.forEach(function(r) {
    var pct = Number(r['年度動支率']);
    var cls = pct >= 90 ? 'hi' : 'warn';
    var row = document.createElement('div');
    row.className = 'bar-row';
    row.style.cursor = 'pointer';
    row.dataset.acc = r['明細帳'];
    row.addEventListener('click', function() { openModal(this.dataset.acc); });
    row.innerHTML =
      '<div class="bar-label"><span><strong>' + r['明細帳'] + '</strong> ' + r['會計項目'] + '</span><span class="pct-' + cls + '">' + pct.toFixed(2) + '%</span></div>' +
      '<div class="bar-track"><div class="bar-fill ' + cls + '" style="width:' + Math.min(100,pct) + '%"></div></div>' +
      '<div style="font-size:11px;color:#888;margin-top:3px">剩餘可動支：' + fmtNum(r['剩餘可動支數']) + ' 元</div>';
    lst.appendChild(row);
  });
}

// ── 詳情彈窗 ────────────────────────────────────────────
function openModal(acc) {
  var r = RAW.find(function(x) { return x['明細帳'] === acc; });
  if (!r) return;
  document.getElementById('modal-title').textContent = r['明細帳'] + '　' + r['會計項目'];
  var body = document.getElementById('modal-body');
  body.innerHTML = '';
  var fields = [
    ['費用分類', r['費用分類'], ''],
    ['本月動支數', fmtNum(r['本月動支數']), '元'],
    ['本月餘額（累計）', fmtNum(r['本月餘額']), '元'],
    ['本月預算數', fmtNum(r['本月預算數']), '元'],
    ['至本月預算數累計', fmtNum(r['至本月預算數累計']), '元'],
    ['累計動支率', fmtPct(r['累計動支率']), ''],
    ['本年度預算', fmtNum(r['本年度預算']), '元'],
    ['年度動支率', fmtPct(r['年度動支率']), ''],
    ['剩餘可動支數', fmtNum(r['剩餘可動支數']), '元'],
  ];
  fields.forEach(function(f) {
    var div = document.createElement('div');
    div.className = 'detail-row';
    var pctCls = '';
    if (f[0].includes('動支率')) pctCls = ' ' + pctClass(parseFloat(f[1]));
    div.innerHTML = '<span class="detail-key">' + f[0] + '</span><span class="detail-val' + pctCls + '">' + f[1] + (f[2]?' '+f[2]:'') + '</span>';
    body.appendChild(div);
  });
  document.getElementById('modal-overlay').className = 'modal-overlay open';
}

document.getElementById('modal-close').addEventListener('click', function() {
  document.getElementById('modal-overlay').className = 'modal-overlay';
});
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.className = 'modal-overlay';
});

// ── 產生時間 ────────────────────────────────────────────
document.getElementById('gen-time').textContent = new Date().toLocaleString('zh-TW');

// ── 初始化 ──────────────────────────────────────────────
applyFilter();
renderChips();
renderTable();
</script>
</div>
</body>
