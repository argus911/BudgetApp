<title>預算管理 115年4月</title>
<style>
:root{--bg:#f2f2f7;--card:#fff;--nav:#1a3a5c;--accent:#0d5fa6;--text:#1c1c1e;--sub:#8e8e93;--border:#e5e5ea;--orange:#ff9500;--red:#ff3b30;--green:#34c759;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);padding-bottom:env(safe-area-inset-bottom);}
.nav{background:var(--nav);padding:calc(env(safe-area-inset-top)+12px) 16px 12px;position:sticky;top:0;z-index:100;}
.nav-title{color:#fff;font-size:17px;font-weight:600;text-align:center;}
.nav-sub{color:rgba(255,255,255,.7);font-size:11px;text-align:center;margin-top:2px;}
.segment{display:flex;background:rgba(255,255,255,.15);border-radius:8px;margin:10px 0 0;padding:2px;}
.seg-btn{flex:1;text-align:center;padding:5px 4px;border-radius:6px;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;transition:all .2s;}
.seg-btn.active{background:#fff;color:var(--nav);font-weight:600;}
.filters{padding:12px 16px 0;}
.lbl{font-size:11px;color:var(--sub);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.fcard{background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.frow{display:flex;align-items:center;padding:11px 14px;border-bottom:.5px solid var(--border);cursor:pointer;}
.frow:last-child{border-bottom:none;}
.ficon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:14px;flex-shrink:0;}
.flabel{flex:1;font-size:14px;color:var(--text);}
.fval{font-size:13px;color:var(--sub);margin-right:6px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fval.on{color:var(--accent);font-weight:500;}
.chevron{color:#c7c7cc;font-size:14px;}
.col-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.chip{background:var(--card);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.chip.on{background:#e8f4fd;}
.chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;}
.chip.on .chk{background:var(--accent);border-color:var(--accent);color:#fff;}
.clabel{font-size:12px;color:var(--text);line-height:1.2;}
.chip.on .clabel{color:var(--accent);font-weight:500;}
.qbtn{margin:0 0 16px;background:var(--accent);border-radius:var(--radius);padding:14px;text-align:center;color:#fff;font-size:15px;font-weight:600;cursor:pointer;border:none;width:100%;}
.qbtn:active{opacity:.85;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sbox{background:var(--card);border-radius:10px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.slabel{font-size:10px;color:var(--sub);margin-bottom:3px;}
.sval{font-size:14px;font-weight:600;}
.sval.blue{color:var(--accent);}
.sval.orange{color:var(--orange);}
.rcnt{font-size:12px;color:var(--sub);}
.rcard{background:var(--card);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.rhdr{background:var(--nav);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.rttl{color:#fff;font-size:12px;font-weight:600;flex:1;margin-right:8px;}
.rbadge{background:rgba(255,255,255,.2);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.rrow{display:flex;justify-content:space-between;align-items:baseline;padding:8px 12px;border-bottom:.5px solid var(--border);}
.rrow:last-child{border-bottom:none;}
.rfield{font-size:11px;color:var(--sub);flex:1;}
.rval{font-size:12px;color:var(--text);font-weight:500;text-align:right;max-width:60%;}
.rval.blue{color:var(--accent);}
.rval.red{color:var(--red);}
.rval.orange{color:var(--orange);}
.rval.green{color:var(--green);}
.rwrap{padding:6px 12px 2px;}
.rrate{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
.rbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.rfill{height:100%;border-radius:3px;background:var(--accent);}
.rfill.warn{background:var(--orange);}
.rfill.danger{background:var(--red);}
.tabbar{background:var(--card);border-top:.5px solid var(--border);display:flex;padding:8px 0 calc(env(safe-area-inset-bottom)+4px);position:fixed;bottom:0;left:0;right:0;z-index:100;}
.titem{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.ticon{font-size:20px;}
.tlabel{font-size:9px;color:var(--sub);}
.titem.active .tlabel{color:var(--accent);}
.sovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;}
.sovl.open{display:flex;align-items:flex-end;}
.sheet{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-height:72vh;overflow-y:auto;}
.shdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;border-bottom:.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1;}
.sttl{font-size:16px;font-weight:600;}
.sclose{color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;padding:4px 8px;}
.ssearch{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin:8px 16px;width:calc(100% - 32px);background:var(--card);color:var(--text);}
.ssearch:focus{outline:none;border-color:var(--accent);}
.sopt{padding:14px 16px;border-bottom:.5px solid var(--border);font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.sopt:last-child{border-bottom:none;}
.sopt.sel{color:var(--accent);font-weight:500;}
.sopt-check{color:var(--accent);font-size:16px;font-weight:700;flex-shrink:0;}
.sopt-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.mc{padding-bottom:80px;}
.page{display:none;}
.page.active{display:block;}
.awrap{padding:20px 16px;}
.acard{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.arow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--border);font-size:13px;}
.arow:last-child{border-bottom:none;}
.akey{color:var(--sub);}
.aval{font-weight:500;}
.summary-band{background:linear-gradient(135deg,#1a3a5c,#0d5fa6);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sb-item{text-align:center;}
.sb-num{color:#fff;font-size:15px;font-weight:700;}
.sb-lbl{color:rgba(255,255,255,.65);font-size:10px;margin-top:2px;}
</style>
</head>

function fmt(v){
  if(v===''||v===null||v===undefined) return '—';
  var n=parseFloat(v);
  if(isNaN(n)) return v;
  return n.toLocaleString('zh-TW');
}
function fmtRate(v){
  if(v===''||v===null||v===undefined) return '—';
  return parseFloat(v).toFixed(2)+'%';
}
function numClass(v,field){
  if(field==='累計動支率'||field==='年度動支率'){
    var n=parseFloat(v);
    if(isNaN(n)) return '';
    if(n>=95) return 'red';
    if(n>=80) return 'orange';
    return 'blue';
  }
  if(field==='剩餘可動支數'){
    var n=parseFloat(v);
    if(isNaN(n)) return '';
    if(n<0) return 'red';
    if(n<100000) return 'orange';
    return 'green';
  }
  return '';
}
function barClass(pct){
  if(pct>=95) return 'danger';
  if(pct>=80) return 'warn';
  return '';
}

// Build column checkboxes
(function(){
  var g=document.getElementById('cgrid');
  COLS.forEach(function(c){
    var on=activeCols.indexOf(c.k)>=0;
    var d=document.createElement('div');
    d.className='chip'+(on?' on':'');
    d.innerHTML='<div class="chk">'+(on?'✓':'')+'</div><div class="clabel">'+c.label+'</div>';
    d.onclick=function(){
      var idx=activeCols.indexOf(c.k);
      if(idx>=0){activeCols.splice(idx,1);d.className='chip';d.querySelector('.chk').textContent='';}
      else{activeCols.push(c.k);d.className='chip on';d.querySelector('.chk').textContent='✓';}
    };
    g.appendChild(d);
  });
})();

function switchPage(p){
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  document.getElementById('pg-'+p).classList.add('active');
  document.querySelectorAll('.seg-btn').forEach(function(b,i){
    b.classList.toggle('active',i===(p==='query'?0:1));
  });
  document.querySelectorAll('.titem').forEach(function(t,i){
    t.classList.toggle('active',i===(p==='query'?0:1));
  });
}

  document.getElementById('ssearch').value='';
  if(type==='unit'){
    document.getElementById('sttl').textContent='選擇預算主管單位';
    document.getElementById('ssearch').style.display='none';
    var units=['（全部）'];
    RAW.forEach(function(r){var u=r['預算主管單位'];if(u&&units.indexOf(u)<0)units.push(u);});
    units.sort(function(a,b){if(a==='（全部）')return -1;if(b==='（全部）')return 1;return a.localeCompare(b,'zh-TW');});
    sheetItems=units;
  } else {
    document.getElementById('sttl').textContent='選擇明細帳';
    document.getElementById('ssearch').style.display='block';
    var map={};
    RAW.forEach(function(r){if(r['明細帳'])map[r['明細帳']]=r['會計項目'];});
    sheetItems=Object.keys(map).sort().map(function(k){return{code:k,name:map[k]};}); 
    sheetItems.unshift({code:'（全部）',name:''});
  }
  renderSheetList('');
}
function renderSheetList(q){
  var sl=document.getElementById('slist');
  sl.innerHTML='';
  var items=sheetItems;
  if(sheetType==='subacc'&&q){
    var qq=q.toUpperCase();
    items=items.filter(function(it){
      var c=it.code||'';var n=it.name||'';
      return c.toUpperCase().indexOf(qq)>=0||n.indexOf(q)>=0;
    });
  }
  items.forEach(function(it){
    var isAll=(sheetType==='unit'?it==='（全部）':it.code==='（全部）');
    var code=sheetType==='unit'?it:(it.code||'');
    var name=sheetType==='unit'?'':(it.name||'');
    var curSel=sheetType==='unit'?selUnit:selSubacc;
    var sel=(isAll&&!curSel)||(code===curSel&&!isAll);
    var d=document.createElement('div');
    d.className='sopt'+(sel?' sel':'');
    d.innerHTML=(isAll?'<div><div>全部</div></div>':
      '<div><div>'+code+'</div>'+(name?'<div class="sopt-sub">'+name+'</div>':'')+'</div>')+
      (sel?'<div class="sopt-check">✓</div>':'');
    d.onclick=function(){
      if(sheetType==='unit'){
        selUnit=isAll?'':code;
        document.getElementById('vunit').textContent=isAll?'全部':code;
        document.getElementById('vunit').className='fval'+(isAll?'':' on');
        // reset subacc
        selSubacc='';
        document.getElementById('vsubacc').textContent='全部';
        document.getElementById('vsubacc').className='fval';
      } else {
        selSubacc=isAll?'':code;
        document.getElementById('vsubacc').textContent=isAll?'全部':code;
        document.getElementById('vsubacc').className='fval'+(isAll?'':' on');
      }
      closeSheet();
    };
    sl.appendChild(d);
  });
}
function closeSheet(e){
  if(e&&e.target!==document.getElementById('sovl')) return;
  document.getElementById('sovl').classList.remove('open');
}

function runQuery(){
  var rows=RAW;
  if(selUnit) rows=rows.filter(function(r){return r['預算主管單位']===selUnit;});
  if(selSubacc) rows=rows.filter(function(r){return r['明細帳']===selSubacc;});

  // Summary stats
  var totBgt=0,totSpend=0,totRem=0,totAcc=0;
  rows.forEach(function(r){
    totBgt+=parseFloat(r['本月預算數'])||0;
    totSpend+=parseFloat(r['本月動支數'])||0;
    totRem+=parseFloat(r['剩餘可動支數'])||0;
    totAcc+=parseFloat(r['至本月預算數累計'])||0;
  });
  var avgRate=totAcc>0?((totSpend/totAcc)*100).toFixed(1):0;

  document.getElementById('ssec').style.display='';
  var sg=document.getElementById('sgrid');
  sg.innerHTML=
    '<div class="sbox"><div class="slabel">符合筆數</div><div class="sval blue">'+rows.length+'</div></div>'+
    '<div class="sbox"><div class="slabel">本月預算合計</div><div class="sval">'+fmt(totBgt)+'</div></div>'+
    '<div class="sbox"><div class="slabel">本月動支合計</div><div class="sval orange">'+fmt(totSpend)+'</div></div>'+
    '<div class="sbox"><div class="slabel">剩餘可動支合計</div><div class="sval blue">'+fmt(totRem)+'</div></div>';

  document.getElementById('rsec').style.display='';
  document.getElementById('rcnt').textContent='共 '+rows.length+' 筆';
  var rl=document.getElementById('rlist');
  rl.innerHTML='';

  if(!rows.length){
    rl.innerHTML='<div class="empty">無符合資料</div>';
    return;
  }

  rows.forEach(function(r){
    var card=document.createElement('div');
    card.className='rcard';
    var badge=r['預算主管單位']||'';
    var hdr='<div class="rhdr"><div class="rttl">'+r['明細帳']+' '+r['會計項目']+'</div>'+(badge?'<div class="rbadge">'+badge+'</div>':'')+'</div>';
    var body='';
    activeCols.forEach(function(k){
      var v=r[k];
      var isRate=(k==='累計動支率'||k==='年度動支率');
      var disp=isRate?fmtRate(v):fmt(v);
      var cls=numClass(v,k);
      body+='<div class="rrow"><div class="rfield">'+k+'</div><div class="rval'+(cls?' '+cls:'')+'">'+disp+'</div></div>';
    });
    // Progress bar for 累計動支率 if selected
    if(activeCols.indexOf('累計動支率')>=0){
      var pct=parseFloat(r['累計動支率'])||0;
      var pctCl=barClass(pct);
      body+='<div class="rwrap"><div class="rrate"><span>累計動支率</span><span>'+fmtRate(pct)+'</span></div>'+
        '<div class="rbar"><div class="rfill'+( pctCl?' '+pctCl:'')+'" style="width:'+Math.min(pct,100)+'%"></div></div></div>';
    }
    card.innerHTML=hdr+body;
    rl.appendChild(card);
  });
}
</script>
</body>
