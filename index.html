<title>預算管理 115年4月 | 中華電信彰化營運處</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang TC","Segoe UI",sans-serif;background:#f0f4f0;color:#1a2e1a;min-height:100vh}
:root{--green:#128048;--dark-green:#0a5c34;--light-green:#e8f5ee;--warn:#e07b00;--danger:#c62828;--blue:#1565c0;--card-bg:#fff;--radius:16px}

/* Header */
.app-header{background:linear-gradient(135deg,#0a5c34 0%,#128048 60%,#1a9a5c 100%);color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,92,52,.35)}
.header-top{display:flex;align-items:center;gap:10px}
.header-icon{font-size:28px}
.header-title{flex:1}
.header-title h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.header-title p{font-size:12px;opacity:.82;margin-top:2px}
.badge{background:rgba(255,255,255,.22);border-radius:12px;padding:3px 10px;font-size:12px;font-weight:600}

/* Tab Bar */
.tab-bar{background:#fff;display:flex;border-bottom:1.5px solid #e0ece5;position:sticky;top:72px;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.tab-btn{flex:1;padding:10px 4px;font-size:12px;color:#666;background:none;border:none;cursor:pointer;font-weight:500;border-bottom:2.5px solid transparent;transition:color .2s,border-color .2s}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #d8ead0;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav .tab-btn{padding:12px 4px 10px;font-size:11px}

/* Content */
.tab-content{display:none;padding:12px 12px 80px}
.tab-content.active{display:block}

/* Notice */
.notice{background:#fff8e1;border:1.5px solid #ffc107;border-radius:12px;padding:10px 14px;font-size:12.5px;color:#6d4c00;margin-bottom:12px;line-height:1.5}

/* Filter Card */
.filter-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.filter-card h3{font-size:13px;color:var(--dark-green);margin-bottom:10px;font-weight:700}
.search-box{width:100%;border:1.5px solid #c8e0d0;border-radius:10px;padding:9px 12px;font-size:14px;color:#1a2e1a;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--green)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:#f0f4f0;border:1.5px solid #d0e0d4;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:#444;transition:all .2s;font-weight:500}
.chip.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}
.chip-section-label{font-size:12px;color:#888;margin-top:8px;margin-bottom:4px;font-weight:600}

/* Active Filter Pills */
.filter-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.filter-pill{border-radius:16px;padding:4px 12px;font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:4px}
.filter-pill.kw{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.filter-pill.cat{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.filter-pill.unit{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:14px;padding:13px;box-shadow:0 1px 8px rgba(0,0,0,.07);text-align:center}
.stat-label{font-size:11px;color:#666;margin-bottom:5px}
.stat-value{font-size:18px;font-weight:800;color:var(--blue)}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--danger)}

/* Result count */
.result-count{font-size:13px;color:#666;margin-bottom:10px;font-weight:500}

/* Cards */
.card-list{display:flex;flex-direction:column;gap:10px}
.budget-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:0 1px 8px rgba(0,0,0,.08);cursor:pointer;transition:transform .1s,box-shadow .1s;border-left:4px solid #c8e0d0}
.budget-card:active{transform:scale(.985);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.budget-card.warn{border-left-color:var(--warn)}
.budget-card.danger{border-left-color:var(--danger)}
.card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.card-code{font-size:12px;color:#888;font-weight:600;min-width:50px}
.card-name{font-size:14px;font-weight:700;color:#1a2e1a;flex:1;line-height:1.3}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.cat-badge{border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700}
.unit-badge{border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card-metric{background:#f7fbf8;border-radius:10px;padding:8px 10px}
.metric-label{font-size:10.5px;color:#777;margin-bottom:3px}
.metric-value{font-size:15px;font-weight:800}
.metric-value.blue{color:var(--blue)}
.metric-value.green{color:var(--green)}
.metric-value.warn{color:var(--warn)}
.metric-value.danger{color:var(--danger)}
.card-progress{margin-top:10px}
.progress-label{font-size:11px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar{background:#e0ece5;border-radius:6px;height:7px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;transition:width .3s}
.progress-fill.green{background:var(--green)}
.progress-fill.warn{background:var(--warn)}
.progress-fill.danger{background:var(--danger)}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap}
.page-btn{background:#fff;border:1.5px solid #c8e0d0;border-radius:10px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--green);font-weight:600}
.page-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.page-btn:disabled{opacity:.4;cursor:default}

/* Summary Tab */
.summary-card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.summary-card h3{font-size:14px;color:var(--dark-green);font-weight:700;margin-bottom:14px;border-bottom:2px solid var(--light-green);padding-bottom:8px}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.overview-item{text-align:center;padding:10px;background:#f7fbf8;border-radius:10px}
.overview-item .lbl{font-size:11px;color:#666}
.overview-item .val{font-size:17px;font-weight:800;color:var(--dark-green);margin-top:4px}
.bar-chart-row{display:flex;flex-direction:column;gap:10px}
.bar-item{display:grid;grid-template-columns:90px 1fr 70px;align-items:center;gap:8px}
.bar-label{font-size:12px;font-weight:600;color:#444;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{background:#e8f0e8;border-radius:6px;height:18px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:#fff;font-weight:700;min-width:28px;transition:width .5s}
.bar-meta{font-size:11px;color:#666;text-align:right}

/* Warning Tab */
.warn-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.07);border-left:4px solid var(--warn)}
.warn-card.high{border-left-color:var(--danger)}

/* Info Tab */
.info-card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f4f0;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-key{color:#666}
.info-val{font-weight:700;color:#1a2e1a}

/* Bottom Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background .3s}
.overlay.open{background:rgba(0,0,0,.5);pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;padding:0 0 env(safe-area-inset-bottom);transform:translateY(100%);transition:transform .35s cubic-bezier(.32,0,.67,0);max-height:90vh;overflow-y:auto;z-index:201}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:5px;background:#d0d8d0;border-radius:3px;margin:12px auto 0}
.sheet-header{padding:16px 20px 12px;border-bottom:1.5px solid #e8f0e8}
.sheet-title{font-size:17px;font-weight:800;color:#1a2e1a}
.sheet-subtitle{font-size:12px;color:#888;margin-top:3px}
.sheet-body{padding:16px 20px}
.sheet-section{margin-bottom:16px}
.sheet-section h4{font-size:12px;color:var(--dark-green);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet-item{background:#f7fbf8;border-radius:10px;padding:10px 12px}
.sheet-item .lbl{font-size:11px;color:#888;margin-bottom:3px}
.sheet-item .val{font-size:16px;font-weight:800}
.sheet-progress{margin-top:14px}

/* Utility */
.fmt-num{font-variant-numeric:tabular-nums}
</style>
</head>

var CAT_COLORS = {
  '人事費':      '#5c35b3',
  '業務外包':    '#2196f3',
  '業務成本':    '#009688',
  '專案建置成本':'#ff6d00',
  '設備及折舊':  '#795548',
  '管銷費用':    '#607d8b',
  '其他':        '#9e9e9e'
};
var UNIT_PALETTE = ['#128048','#1565c0','#e65100','#6a1b9a','#00695c','#c62828','#1b5e20','#0d47a1','#bf360c','#4a148c','#006064','#b71c1c'];

// Build unit map
var unitList = [];
(function(){
  var seen = {};
  RAW.forEach(function(r){ if(r['預算主管單位'] && !seen[r['預算主管單位']]){ seen[r['預算主管單位']]=true; unitList.push(r['預算主管單位']); } });
  unitList.sort();
})();

var unitColorMap = {};
unitList.forEach(function(u,i){ unitColorMap[u] = UNIT_PALETTE[i % UNIT_PALETTE.length]; });

// State
var state = { kw:'', cat:'all', unit:'all', page:1 };
var PAGE_SIZE = 20;

function fmtNum(n){
  if(n === '' || n === null || n === undefined) return '—';
  if(typeof n === 'string' && n === '') return '—';
  var num = Number(n);
  if(isNaN(num)) return String(n);
  return num.toLocaleString('zh-TW');
}
function fmtPct(n){
  if(n === '' || n === null || n === undefined) return '—';
  return Number(n).toFixed(2) + '%';
}
function rateColor(r){
  var v = parseFloat(r);
  if(isNaN(v)) return 'green';
  if(v >= 90) return 'danger';
  if(v >= 70) return 'warn';
  return 'green';
}

// Filtered data
function getFiltered(){
  var kw = state.kw.toLowerCase().trim();
  return RAW.filter(function(r){
    if(kw && !(r['明細帳'].toLowerCase().includes(kw) || r['會計項目'].toLowerCase().includes(kw))) return false;
    if(state.cat !== 'all' && r['費用分類'] !== state.cat) return false;
    if(state.unit !== 'all' && r['預算主管單位'] !== state.unit) return false;
    return true;
  });
}

// Render chips
function renderChips(){
  // Category chips
  var cats = ['all','人事費','業務外包','業務成本','專案建置成本','設備及折舊','管銷費用'];
  var cc = document.getElementById('catChips');
  cc.innerHTML = '';
  cats.forEach(function(c){
    var btn = document.createElement('button');
    btn.className = 'chip' + (state.cat === c ? ' active' : '');
    btn.textContent = c === 'all' ? '全部' : c;
    btn.dataset.cat = c;
    cc.appendChild(btn);
  });
  cc.querySelectorAll('.chip').forEach(function(btn){
    btn.addEventListener('click', function(){ state.cat = this.dataset.cat; state.page = 1; render(); });
  });

  // Unit chips
  var uc = document.getElementById('unitChips');
  uc.innerHTML = '';
  var allUnits = ['all'].concat(unitList);
  allUnits.forEach(function(u){
    var btn = document.createElement('button');
    btn.className = 'chip' + (state.unit === u ? ' active' : '');
    btn.textContent = u === 'all' ? '全部' : u;
    btn.dataset.unit = u;
    if(u !== 'all') { btn.style.borderColor = unitColorMap[u]; if(state.unit === u) btn.style.background = unitColorMap[u]; }
    uc.appendChild(btn);
  });
  uc.querySelectorAll('.chip').forEach(function(btn){
    btn.addEventListener('click', function(){ state.unit = this.dataset.unit; state.page = 1; render(); });
  });
}

// Render filter pills
function renderPills(){
  var pills = document.getElementById('filterPills');
  pills.innerHTML = '';
  if(state.kw){
    var p = document.createElement('span');
    p.className = 'filter-pill kw';
    p.textContent = '🔍 ' + state.kw;
    pills.appendChild(p);
  }
  if(state.cat !== 'all'){
    var p = document.createElement('span');
    p.className = 'filter-pill cat';
    p.textContent = '📂 ' + state.cat;
    pills.appendChild(p);
  }
  if(state.unit !== 'all'){
    var p = document.createElement('span');
    p.className = 'filter-pill unit';
    p.textContent = '🏢 ' + state.unit;
    pills.appendChild(p);
  }
}

// Render stats
function renderStats(filtered){
  var totalBal = 0, totalBudMon = 0, totalBudYr = 0, totalRemain = 0;
  filtered.forEach(function(r){
    totalBal    += Number(r['本月餘額']) || 0;
    totalBudMon += Number(r['本月預算數']) || 0;
    totalBudYr  += Number(r['本年度預算']) || 0;
    totalRemain += Number(r['剩餘可動支數']) || 0;
  });
  var sg = document.getElementById('statsGrid');
  sg.innerHTML = '';
  var items = [
    {lbl:'本月餘額（累計）', val:fmtNum(totalBal), cls:'blue'},
    {lbl:'本月預算數', val:fmtNum(totalBudMon), cls:'green'},
    {lbl:'本年度預算', val:fmtNum(totalBudYr), cls:'green'},
    {lbl:'剩餘可動支數', val:fmtNum(totalRemain), cls: totalRemain < 0 ? 'red' : 'green'},
  ];
  items.forEach(function(it){
    var d = document.createElement('div');
    d.className = 'stat-card';
    d.innerHTML = '<div class="stat-label">'+it.lbl+'</div><div class="stat-value '+it.cls+' fmt-num">'+it.val+'</div>';
    sg.appendChild(d);
  });
}

// Render card list
function renderCards(filtered){
  var start = (state.page-1)*PAGE_SIZE, end = start+PAGE_SIZE;
  var page_data = filtered.slice(start, end);
  var cl = document.getElementById('cardList');
  cl.innerHTML = '';
  
  page_data.forEach(function(r){
    var yr = parseFloat(r['年度動支率']) || 0;
    var cardCls = 'budget-card' + (yr >= 90 ? ' danger' : yr >= 70 ? ' warn' : '');
    var catColor = CAT_COLORS[r['費用分類']] || '#9e9e9e';
    var unitHtml = r['預算主管單位'] ? '<span class="unit-badge" style="background:'+unitColorMap[r['預算主管單位']]+'22;color:'+unitColorMap[r['預算主管單位']]+'">'+r['預算主管單位']+'</span>' : '';
    var pct = Math.min(yr, 100);
    var pFill = rateColor(yr);
    
    var card = document.createElement('div');
    card.className = cardCls;
    card.dataset.acc = r['明細帳'];
    card.innerHTML =
      '<div class="card-header">'+
        '<span class="card-code">'+r['明細帳']+'</span>'+
        '<span class="card-name">'+r['會計項目']+'</span>'+
      '</div>'+
      '<div class="card-badges">'+
        '<span class="cat-badge" style="background:'+catColor+'22;color:'+catColor+'">'+r['費用分類']+'</span>'+
        unitHtml+
      '</div>'+
      '<div class="card-grid" style="margin-top:10px">'+
        '<div class="card-metric"><div class="metric-label">本月餘額（累計）</div><div class="metric-value blue fmt-num">'+fmtNum(r['本月餘額'])+'</div></div>'+
        '<div class="card-metric"><div class="metric-label">累計動支率</div><div class="metric-value '+rateColor(r['累計動支率'])+'">'+fmtPct(r['累計動支率'])+'</div></div>'+
        '<div class="card-metric"><div class="metric-label">本年度預算</div><div class="metric-value fmt-num">'+fmtNum(r['本年度預算'])+'</div></div>'+
        '<div class="card-metric"><div class="metric-label">剩餘可動支數</div><div class="metric-value '+(parseFloat(r['剩餘可動支數'])<0?'danger':'green')+' fmt-num">'+fmtNum(r['剩餘可動支數'])+'</div></div>'+
      '</div>'+
      '<div class="card-progress">'+
        '<div class="progress-label"><span>年度動支率</span><span class="fmt-num">'+fmtPct(r['年度動支率'])+'</span></div>'+
        '<div class="progress-bar"><div class="progress-fill '+pFill+'" style="width:'+pct+'%"></div></div>'+
      '</div>';
    cl.appendChild(card);
  });
  
  cl.querySelectorAll('.budget-card').forEach(function(card){
    card.addEventListener('click', function(){ openSheet(this.dataset.acc); });
  });
}

// Render pagination
function renderPagination(total){
  var totalPages = Math.ceil(total / PAGE_SIZE);
  var pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if(totalPages <= 1) return;
  for(var i=1; i<=totalPages; i++){
    var btn = document.createElement('button');
    btn.className = 'page-btn' + (i === state.page ? ' active' : '');
    btn.textContent = String(i);
    btn.dataset.page = String(i);
    pg.appendChild(btn);
  }
  pg.querySelectorAll('.page-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      state.page = parseInt(this.dataset.page);
      render();
      window.scrollTo(0, 0);
    });
  });
}

// Main render
function render(){
  var filtered = getFiltered();
  document.getElementById('totalBadge').textContent = filtered.length + ' 筆';
  document.getElementById('resultCount').textContent = '共 ' + filtered.length + ' 筆';
  renderChips();
  renderPills();
  renderStats(filtered);
  renderCards(filtered);
  renderPagination(filtered.length);
}

// Summary Tab
function renderSummary(){
  var totalBudYr = 0, totalRemain = 0, totalBal = 0, totalBudMon = 0;
  RAW.forEach(function(r){
    totalBudYr  += Number(r['本年度預算']) || 0;
    totalRemain += Number(r['剩餘可動支數']) || 0;
    totalBal    += Number(r['本月餘額']) || 0;
    totalBudMon += Number(r['本月預算數']) || 0;
  });
  var used = totalBudYr - totalRemain;
  var yrRate = totalBudYr > 0 ? (used/totalBudYr*100) : 0;
  
  var og = document.getElementById('overviewGrid');
  var items = [
    {lbl:'本年度預算合計', val:fmtNum(totalBudYr)},
    {lbl:'剩餘可動支合計', val:fmtNum(totalRemain)},
    {lbl:'累計動支合計', val:fmtNum(totalBal)},
    {lbl:'年度整體動支率', val:yrRate.toFixed(1)+'%'},
  ];
  og.innerHTML = '';
  items.forEach(function(it){
    var d = document.createElement('div');
    d.className = 'overview-item';
    d.innerHTML = '<div class="lbl">'+it.lbl+'</div><div class="val fmt-num">'+it.val+'</div>';
    og.appendChild(d);
  });
  
  // Category bar chart
  var catMap = {};
  RAW.forEach(function(r){
    var c = r['費用分類'];
    if(!catMap[c]) catMap[c] = {budget:0, remain:0};
    catMap[c].budget  += Number(r['本年度預算']) || 0;
    catMap[c].remain  += Number(r['剩餘可動支數']) || 0;
  });
  var ccr = document.getElementById('catChartRows');
  ccr.innerHTML = '';
  Object.keys(catMap).sort().forEach(function(c){
    var bgt = catMap[c].budget, rem = catMap[c].remain;
    var used = bgt - rem;
    var pct = bgt > 0 ? Math.min(used/bgt*100, 100) : 0;
    var color = CAT_COLORS[c] || '#9e9e9e';
    var row = document.createElement('div');
    row.className = 'bar-item';
    row.innerHTML =
      '<span class="bar-label" title="'+c+'">'+c+'</span>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct.toFixed(1)+'%;background:'+color+'">'+pct.toFixed(0)+'%</div></div>'+
      '<span class="bar-meta fmt-num">'+fmtNum(bgt)+'</span>';
    ccr.appendChild(row);
  });
  
  // Unit bar chart
  var unitMap = {};
  RAW.forEach(function(r){
    var u = r['預算主管單位'];
    if(!u) return;
    if(!unitMap[u]) unitMap[u] = {budget:0, remain:0};
    unitMap[u].budget  += Number(r['本年度預算']) || 0;
    unitMap[u].remain  += Number(r['剩餘可動支數']) || 0;
  });
  var ucr = document.getElementById('unitChartRows');
  ucr.innerHTML = '';
  Object.keys(unitMap).sort().forEach(function(u){
    var bgt = unitMap[u].budget, rem = unitMap[u].remain;
    var used = bgt - rem;
    var pct = bgt > 0 ? Math.min(used/bgt*100, 100) : 0;
    var color = unitColorMap[u] || '#128048';
    var row = document.createElement('div');
    row.className = 'bar-item';
    row.innerHTML =
      '<span class="bar-label" title="'+u+'">'+u+'</span>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct.toFixed(1)+'%;background:'+color+'">'+pct.toFixed(0)+'%</div></div>'+
      '<span class="bar-meta fmt-num">'+fmtNum(bgt)+'</span>';
    ucr.appendChild(row);
  });
}

// Warning Tab
function renderWarning(){
  var warned = RAW.filter(function(r){ return parseFloat(r['年度動支率']) >= 70; })
                  .sort(function(a,b){ return parseFloat(b['年度動支率']) - parseFloat(a['年度動支率']); });
  var wl = document.getElementById('warnList');
  wl.innerHTML = '';
  if(!warned.length){
    wl.innerHTML = '<div style="text-align:center;padding:40px;color:#888">✅ 無高用率項目</div>';
    return;
  }
  warned.forEach(function(r){
    var yr = parseFloat(r['年度動支率']) || 0;
    var cls = 'warn-card' + (yr >= 90 ? ' high' : '');
    var catColor = CAT_COLORS[r['費用分類']] || '#9e9e9e';
    var unitHtml = r['預算主管單位'] ? '<span class="unit-badge" style="background:'+unitColorMap[r['預算主管單位']]+'22;color:'+unitColorMap[r['預算主管單位']]+'">'+r['預算主管單位']+'</span>' : '';
    var pFill = rateColor(yr);
    var pct = Math.min(yr, 100);
    var card = document.createElement('div');
    card.className = cls;
    card.dataset.acc = r['明細帳'];
    card.innerHTML =
      '<div class="card-header">'+
        '<span class="card-code">'+r['明細帳']+'</span>'+
        '<span class="card-name">'+r['會計項目']+'</span>'+
      '</div>'+
      '<div class="card-badges">'+
        '<span class="cat-badge" style="background:'+catColor+'22;color:'+catColor+'">'+r['費用分類']+'</span>'+
        unitHtml+
      '</div>'+
      '<div style="margin-top:10px">'+
        '<div class="progress-label"><span>年度動支率</span><span class="fmt-num" style="color:'+(yr>=90?'#c62828':'#e07b00')+';font-weight:700">'+fmtPct(yr)+'</span></div>'+
        '<div class="progress-bar"><div class="progress-fill '+pFill+'" style="width:'+pct+'%"></div></div>'+
      '</div>'+
      '<div class="card-grid" style="margin-top:10px">'+
        '<div class="card-metric"><div class="metric-label">本年度預算</div><div class="metric-value fmt-num">'+fmtNum(r['本年度預算'])+'</div></div>'+
        '<div class="card-metric"><div class="metric-label">剩餘可動支數</div><div class="metric-value '+(parseFloat(r['剩餘可動支數'])<0?'danger':'warn')+' fmt-num">'+fmtNum(r['剩餘可動支數'])+'</div></div>'+
      '</div>';
    card.addEventListener('click', function(){ openSheet(this.dataset.acc); });
    wl.appendChild(card);
  });
}

// Bottom Sheet
function openSheet(acc){
  var r = RAW.find(function(x){ return x['明細帳'] === acc; });
  if(!r) return;
  document.getElementById('sheetTitle').textContent = r['會計項目'];
  document.getElementById('sheetSubtitle').textContent = r['明細帳'] + '　' + r['費用分類'] + (r['預算主管單位'] ? '　' + r['預算主管單位'] : '');
  var yr = parseFloat(r['年度動支率']) || 0;
  var pct = Math.min(yr, 100);
  var pFill = rateColor(yr);
  var sb = document.getElementById('sheetBody');
  sb.innerHTML =
    '<div class="sheet-section"><h4>本月數據</h4>'+
    '<div class="sheet-grid">'+
      '<div class="sheet-item"><div class="lbl">本月餘額（累計）</div><div class="val blue fmt-num">'+fmtNum(r['本月餘額'])+'</div></div>'+
      '<div class="sheet-item"><div class="lbl">本月預算數</div><div class="val fmt-num">'+fmtNum(r['本月預算數'])+'</div></div>'+
      '<div class="sheet-item"><div class="lbl">本月動支數</div><div class="val fmt-num">'+fmtNum(r['本月動支數'])+'</div></div>'+
      '<div class="sheet-item"><div class="lbl">累計動支率</div><div class="val '+rateColor(r['累計動支率'])+'">'+fmtPct(r['累計動支率'])+'</div></div>'+
    '</div></div>'+
    '<div class="sheet-section"><h4>年度數據</h4>'+
    '<div class="sheet-grid">'+
      '<div class="sheet-item"><div class="lbl">本年度預算</div><div class="val fmt-num">'+fmtNum(r['本年度預算'])+'</div></div>'+
      '<div class="sheet-item"><div class="lbl">至本月預算累計</div><div class="val fmt-num">'+fmtNum(r['至本月預算數累計'])+'</div></div>'+
      '<div class="sheet-item"><div class="lbl">剩餘可動支數</div><div class="val '+(parseFloat(r['剩餘可動支數'])<0?'danger':'green')+' fmt-num">'+fmtNum(r['剩餘可動支數'])+'</div></div>'+
      '<div class="sheet-item"><div class="lbl">年度動支率</div><div class="val '+rateColor(r['年度動支率'])+'">'+fmtPct(r['年度動支率'])+'</div></div>'+
    '</div></div>'+
    '<div class="sheet-progress"><div class="progress-label"><span>年度動支進度</span><span>'+fmtPct(yr)+'</span></div>'+
    '<div class="progress-bar" style="height:10px"><div class="progress-fill '+pFill+'" style="width:'+pct+'%"></div></div></div>';
  document.getElementById('overlay').className = 'overlay open';
}

document.getElementById('overlay').addEventListener('click', function(e){
  if(e.target === this) this.className = 'overlay';
});

// Tab switching
function switchTab(tabName){
  document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  var tc = document.getElementById('tab-'+tabName);
  if(tc) tc.classList.add('active');
  document.querySelectorAll('[data-tab="'+tabName+'"]').forEach(function(b){ b.classList.add('active'); });
  if(tabName === 'summary') renderSummary();
  if(tabName === 'warning') renderWarning();
}

document.getElementById('topTabBar').querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){ switchTab(this.dataset.tab); });
});
document.getElementById('bottomNav').querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){ switchTab(this.dataset.tab); });
});

// Search
document.getElementById('searchBox').addEventListener('input', function(){
  state.kw = this.value; state.page = 1; render();
});

// Info tab
document.getElementById('infoTotal').textContent = RAW.length + ' 筆';
document.getElementById('infoTime').textContent = new Date().toLocaleString('zh-TW');

// Init
render();
})();
</script>
