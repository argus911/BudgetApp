<title>預算管理 115年4月</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f0f4f0;color:#1a1a1a;padding-bottom:env(safe-area-inset-bottom,20px)}
:root{--green:#128048;--green2:#0d6035;--green-light:#e8f5ee;--orange:#e07b00;--red:#c62828;--blue:#1565c0}
.header{background:linear-gradient(135deg,var(--green2) 0%,var(--green) 100%);color:#fff;padding:calc(env(safe-area-inset-top,10px)+12px) 16px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:17px;font-weight:700;letter-spacing:.5px}
.header-sub{font-size:11px;opacity:.85;margin-top:2px}
.badge{background:rgba(255,255,255,.25);border-radius:12px;padding:3px 9px;font-size:12px;font-weight:600}
.tab-bar{background:#fff;display:flex;overflow-x:auto;border-bottom:2px solid #e0e8e4;position:sticky;top:calc(env(safe-area-inset-top,10px)+60px);z-index:99;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:none;padding:11px 16px;font-size:14px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.tab-pane{display:none;padding:12px 12px 80px}
.tab-pane.active{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #ddd;padding-bottom:env(safe-area-inset-bottom,8px);z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.1)}
.bottom-nav .tab-btn{flex:1;padding:10px 4px 6px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px}
.bottom-nav .tab-btn .icon{font-size:20px}
.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.card-title{font-size:13px;color:#555;margin-bottom:8px;font-weight:600}
.filter-card .search-box{width:100%;border:1.5px solid #d0e4d8;border-radius:12px;padding:10px 14px;font-size:15px;outline:none;background:#fafffe}
.filter-card .search-box:focus{border-color:var(--green)}
.chips-label{font-size:12px;color:#777;margin:10px 0 6px;font-weight:600}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1.5px solid #c8e0d0;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;background:#f5fbf8;color:#2a5a3a;font-weight:500;transition:all .15s}
.chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.filter-pill{border-radius:14px;padding:4px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px}
.filter-pill.cat{background:#e8f5ee;color:var(--green)}
.filter-pill.unit{background:#e8f0ff;color:#3a4aaa}
.filter-pill.kw{background:#fff3e0;color:#a05000}
.notice{background:#fff8e1;border:1.5px solid #ffc107;border-radius:12px;padding:10px 14px;font-size:12px;color:#7a5800;margin-bottom:10px;line-height:1.5}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:#fff;border-radius:14px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.stat-label{font-size:11px;color:#777;margin-bottom:4px}
.stat-val{font-size:17px;font-weight:700}
.stat-val.blue{color:var(--blue)}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.result-count{font-size:13px;color:#777;margin-bottom:8px;padding:0 2px}
.item-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);cursor:pointer;transition:transform .1s}
.item-card:active{transform:scale(.98)}
.item-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.item-id{font-size:13px;font-weight:700;color:#333;margin-bottom:2px}
.item-name{font-size:12px;color:#666}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.cat-badge,.unit-badge{border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.item-field{background:#f8fdf8;border-radius:10px;padding:8px 10px}
.field-label{font-size:10px;color:#888;margin-bottom:2px}
.field-val{font-size:14px;font-weight:700}
.field-val.blue{color:var(--blue)}
.field-val.green{color:var(--green)}
.field-val.red{color:var(--red)}
.field-val.orange{color:var(--orange)}
.progress-wrap{margin-top:6px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:4px}
.progress-bar{height:8px;background:#e8f0e8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}
.pagination{display:flex;justify-content:center;gap:8px;margin:12px 0;flex-wrap:wrap}
.page-btn{border:1.5px solid var(--green);border-radius:10px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--green);background:#fff;cursor:pointer}
.page-btn.active{background:var(--green);color:#fff}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-label{font-size:12px;font-weight:600;width:90px;text-align:right;flex-shrink:0;color:#444}
.bar-track{flex:1;height:22px;background:#eef5f0;border-radius:8px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.bar-pct{font-size:11px;font-weight:700;color:#fff;white-space:nowrap}
.bar-amounts{font-size:11px;color:#666;text-align:right;width:120px;flex-shrink:0}
.warn-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.07)}
.warn-card.warn-orange{border-left:4px solid var(--orange)}
.warn-card.warn-red{border-left:4px solid var(--red)}
.warn-id{font-size:13px;font-weight:700;color:#333}
.warn-name{font-size:12px;color:#666;margin-top:1px}
.warn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.warn-pill{border-radius:10px;padding:3px 10px;font-size:12px;font-weight:600}
.warn-pill.orange{background:#fff3e0;color:var(--orange)}
.warn-pill.red{background:#ffebee;color:var(--red)}
.warn-pill.green{background:#e8f5ee;color:var(--green)}
.warn-pill.blue{background:#e3f0ff;color:var(--blue)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);pointer-events:none;z-index:200;transition:background .25s}
.overlay.open{background:rgba(0,0,0,.45);pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:16px 16px calc(env(safe-area-inset-bottom,12px)+16px);transform:translateY(110%);transition:transform .3s cubic-bezier(.32,0,0,1);max-height:80vh;overflow-y:auto;z-index:201}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 12px}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:4px}
.sheet-sub{font-size:13px;color:#777;margin-bottom:14px}
.sheet-section{font-size:12px;font-weight:700;color:var(--green);margin:12px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sheet-field{background:#f5fbf8;border-radius:10px;padding:10px 12px}
.sheet-field-label{font-size:11px;color:#888;margin-bottom:3px}
.sheet-field-val{font-size:15px;font-weight:700}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.info-label{color:#777}
.info-val{font-weight:600}
</style>
</head>

  '\u5c08\u6848\u5efa\u7f6e\u6210\u672c':'#fff3e0','\u8a2d\u5099\u53ca\u6298\u820a':'#e0f7fa','\u7ba1\u92b7\u8cbb\u7528':'#eceff1','\u5176\u4ed6':'#fafafa'
};
var UNIT_PALETTE = ['#1565c0','#6a1b9a','#00695c','#e65100','#c62828','#2e7d32','#0277bd','#4e342e','#37474f','#ad1457','#00838f','#558b2f','#f9a825'];
var unitColorMap = {};
function getUnitColor(unit) {
  if(!unit) return '#888';
  if(!unitColorMap[unit]) {
    var keys = Object.keys(unitColorMap);
    unitColorMap[unit] = UNIT_PALETTE[keys.length % UNIT_PALETTE.length];
  }
  return unitColorMap[unit];
}
function fmt(n) {
  if(n===''||n===null||n===undefined) return '\u2014';
  return Number(n).toLocaleString('zh-TW');
}
function fmtPct(n) {
  if(n===''||n===null||n===undefined) return '\u2014';
  return parseFloat(n).toFixed(2)+'%';
}
function rateColor(r) {
  r = parseFloat(r);
  if(isNaN(r)) return 'green';
  if(r>=90) return 'red';
  if(r>=70) return 'orange';
  return 'green';
}
RAW.forEach(function(r){ if(r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']) getUnitColor(r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']); });

var state = {kw:'', cat:'all', unit:'all', page:1};
var PAGE_SIZE = 20;

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); });
  document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.toggle('active', p.id==='tab-'+tab); });
}
document.getElementById('top-tabs').addEventListener('click', function(e){
  if(e.target.dataset.tab) switchTab(e.target.dataset.tab);
});
document.getElementById('bottom-nav').addEventListener('click', function(e){
  var b = e.target.closest('[data-tab]');
  if(b) switchTab(b.dataset.tab);
});

var CATS = ['all','\u4eba\u4e8b\u8cbb','\u696d\u52d9\u5916\u5305','\u696d\u52d9\u6210\u672c','\u5c08\u6848\u5efa\u7f6e\u6210\u672c','\u8a2d\u5099\u53ca\u6298\u820a','\u7ba1\u92b7\u8cbb\u7528','\u5176\u4ed6'];
var catWrap = document.getElementById('cat-chips');
CATS.forEach(function(c) {
  var btn = document.createElement('button');
  btn.className = 'chip' + (c==='all'?' active':'');
  btn.textContent = c==='all'?'\u5168\u90e8':c;
  btn.dataset.cat = c;
  catWrap.appendChild(btn);
});
catWrap.addEventListener('click', function(e) {
  var b = e.target.closest('[data-cat]');
  if(!b) return;
  state.cat = b.dataset.cat; state.page = 1;
  catWrap.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('active',c.dataset.cat===state.cat); });
  render();
});

var unitSet = {};
RAW.forEach(function(r){ if(r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']) unitSet[r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']]=true; });
var UNITS = ['all'].concat(Object.keys(unitSet).sort());
var unitWrap = document.getElementById('unit-chips');
UNITS.forEach(function(u) {
  var btn = document.createElement('button');
  btn.className = 'chip' + (u==='all'?' active':'');
  btn.textContent = u==='all'?'\u5168\u90e8':u;
  btn.dataset.unit = u;
  if(u!=='all') btn.style.borderColor=getUnitColor(u);
  unitWrap.appendChild(btn);
});
unitWrap.addEventListener('click', function(e) {
  var b = e.target.closest('[data-unit]');
  if(!b) return;
  state.unit = b.dataset.unit; state.page = 1;
  unitWrap.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('active',c.dataset.unit===state.unit); });
  render();
});

document.getElementById('kw-input').addEventListener('input', function() {
  state.kw = this.value.trim(); state.page = 1; render();
});

function filtered() {
  return RAW.filter(function(r) {
    if(state.cat!=='all' && r['\u8cbb\u7528\u5206\u985e']!==state.cat) return false;
    if(state.unit!=='all' && r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']!==state.unit) return false;
    if(state.kw) {
      var kw = state.kw.toLowerCase();
      if(!r['\u660e\u7d30\u5e33'].toLowerCase().includes(kw) && !r['\u6703\u8a08\u9805\u76ee'].toLowerCase().includes(kw)) return false;
    }
    return true;
  });
}

function render() {
  var rows = filtered();
  document.getElementById('total-badge').textContent = RAW.length + ' \u7b46';
  document.getElementById('result-count').textContent = '\u5171 ' + rows.length + ' \u7b46';
  var af = document.getElementById('active-filters');
  af.innerHTML = '';
  if(state.kw) { var p=document.createElement('span'); p.className='filter-pill kw'; p.textContent='\uD83D\uDD24 '+state.kw; af.appendChild(p); }
  if(state.cat!=='all') { var p=document.createElement('span'); p.className='filter-pill cat'; p.textContent='\uD83D\uDCC2 '+state.cat; af.appendChild(p); }
  if(state.unit!=='all') { var p=document.createElement('span'); p.className='filter-pill unit'; p.textContent='\uD83C\uDFE2 '+state.unit; af.appendChild(p); }

  var totBal=0,totBgt=0,totYearBgt=0,totRemain=0;
  rows.forEach(function(r){
    totBal+=Number(r['\u672c\u6708\u9918\u984d'])||0;
    totBgt+=Number(r['\u672c\u6708\u9810\u7b97\u6578'])||0;
    totYearBgt+=Number(r['\u672c\u5e74\u5ea6\u9810\u7b97'])||0;
    totRemain+=Number(r['\u5269\u9918\u53ef\u52d5\u652f\u6578'])||0;
  });
  var sg=document.getElementById('stats-grid');
  sg.innerHTML='<div class="stat-card"><div class="stat-label">\u672c\u6708\u9918\u984d\uff08\u7d2f\u8a08\uff09</div><div class="stat-val blue">'+fmt(Math.round(totBal))+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">\u672c\u6708\u9810\u7b97\u6578</div><div class="stat-val green">'+fmt(Math.round(totBgt))+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">\u672c\u5e74\u5ea6\u9810\u7b97</div><div class="stat-val green">'+fmt(Math.round(totYearBgt))+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">\u5269\u9918\u53ef\u52d5\u652f\u6578</div><div class="stat-val '+(totRemain<0?'red':'green')+'">'+fmt(Math.round(totRemain))+'</div></div>';

  var totalPages = Math.max(1, Math.ceil(rows.length/PAGE_SIZE));
  if(state.page>totalPages) state.page=1;
  var pageRows = rows.slice((state.page-1)*PAGE_SIZE, state.page*PAGE_SIZE);

  var list = document.getElementById('item-list');
  list.innerHTML = '';
  pageRows.forEach(function(r) {
    var div = document.createElement('div');
    div.className = 'item-card';
    div.dataset.acc = r['\u660e\u7d30\u5e33'];
    var cc = CAT_COLORS[r['\u8cbb\u7528\u5206\u985e']]||'#555';
    var cbg = CAT_BG[r['\u8cbb\u7528\u5206\u985e']]||'#f5f5f5';
    var uc = getUnitColor(r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']);
    var unitBadge = r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']
      ? '<span class="unit-badge" style="background:'+uc+'1a;color:'+uc+'">'+r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']+'</span>'
      : '';
    var rc = rateColor(r['\u5e74\u5ea6\u52d5\u652f\u7387']);
    var pct = parseFloat(r['\u5e74\u5ea6\u52d5\u652f\u7387'])||0;
    var barColor = rc==='red'?'#c62828':rc==='orange'?'#e07b00':'#128048';
    div.innerHTML =
      '<div class="item-header"><div>'+
        '<div class="item-id">['+(r['\u660e\u7d30\u5e33']||'\u2014')+']</div>'+
        '<div class="item-name">'+(r['\u6703\u8a08\u9805\u76ee']||'\u2014')+'</div>'+
        '<div class="badges"><span class="cat-badge" style="background:'+cbg+';color:'+cc+'">'+r['\u8cbb\u7528\u5206\u985e']+'</span>'+unitBadge+'</div>'+
      '</div></div>'+
      '<div class="item-grid">'+
        '<div class="item-field"><div class="field-label">\u672c\u6708\u9918\u984d\uff08\u7d2f\u8a08\uff09</div><div class="field-val blue">'+fmt(r['\u672c\u6708\u9918\u984d'])+'</div></div>'+
        '<div class="item-field"><div class="field-label">\u7d2f\u8a08\u52d5\u652f\u7387</div><div class="field-val '+rateColor(r['\u7d2f\u8a08\u52d5\u652f\u7387'])+'">'+fmtPct(r['\u7d2f\u8a08\u52d5\u652f\u7387'])+'</div></div>'+
        '<div class="item-field"><div class="field-label">\u672c\u5e74\u5ea6\u9810\u7b97</div><div class="field-val">'+fmt(r['\u672c\u5e74\u5ea6\u9810\u7b97'])+'</div></div>'+
        '<div class="item-field"><div class="field-label">\u5269\u9918\u53ef\u52d5\u652f\u6578</div><div class="field-val '+(Number(r['\u5269\u9918\u53ef\u52d5\u652f\u6578'])<0?'red':'green')+'">'+fmt(r['\u5269\u9918\u53ef\u52d5\u652f\u6578'])+'</div></div>'+
      '</div>'+
      '<div class="progress-wrap">'+
        '<div class="progress-label"><span>\u5e74\u5ea6\u52d5\u652f\u7387</span><span style="color:'+barColor+'">'+fmtPct(r['\u5e74\u5ea6\u52d5\u652f\u7387'])+'</span></div>'+
        '<div class="progress-bar"><div class="progress-fill" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div></div>'+
      '</div>';
    list.appendChild(div);
  });
  list.querySelectorAll('[data-acc]').forEach(function(el){
    el.addEventListener('click', function(){ openSheet(this.dataset.acc); });
  });

  var pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if(totalPages>1){
    for(var i=1;i<=totalPages;i++){
      var b=document.createElement('button');
      b.className='page-btn'+(i===state.page?' active':'');
      b.textContent=i;
      b.dataset.pg=i;
      pg.appendChild(b);
    }
    pg.addEventListener('click', function(e){
      var b=e.target.closest('[data-pg]');
      if(!b) return;
      state.page=parseInt(b.dataset.pg); render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }
}

function openSheet(acc) {
  var r = RAW.find(function(x){ return x['\u660e\u7d30\u5e33']===acc; });
  if(!r) return;
  document.getElementById('sheet-title').textContent = '['+r['\u660e\u7d30\u5e33']+'] '+r['\u6703\u8a08\u9805\u76ee'];
  document.getElementById('sheet-sub').textContent = r['\u8cbb\u7528\u5206\u985e'] + (r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']?' \u30fb '+r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']:'');
  document.getElementById('sheet-monthly').innerHTML =
    '<div class="sheet-field"><div class="sheet-field-label">\u672c\u6708\u9918\u984d\uff08\u7d2f\u8a08\uff09</div><div class="sheet-field-val" style="color:#1565c0">'+fmt(r['\u672c\u6708\u9918\u984d'])+'</div></div>'+
    '<div class="sheet-field"><div class="sheet-field-label">\u672c\u6708\u52d5\u652f\u6578</div><div class="sheet-field-val">'+fmt(r['\u672c\u6708\u52d5\u652f\u6578'])+'</div></div>'+
    '<div class="sheet-field"><div class="sheet-field-label">\u672c\u6708\u9810\u7b97\u6578</div><div class="sheet-field-val">'+fmt(r['\u672c\u6708\u9810\u7b97\u6578'])+'</div></div>'+
    '<div class="sheet-field"><div class="sheet-field-label">\u81f3\u672c\u6708\u9810\u7b97\u6578\u7d2f\u8a08</div><div class="sheet-field-val">'+fmt(r['\u81f3\u672c\u6708\u9810\u7b97\u6578\u7d2f\u8a08'])+'</div></div>'+
    '<div class="sheet-field"><div class="sheet-field-label">\u7d2f\u8a08\u52d5\u652f\u7387</div><div class="sheet-field-val" style="color:'+({'red':'#c62828','orange':'#e07b00','green':'#128048'}[rateColor(r['\u7d2f\u8a08\u52d5\u652f\u7387'])])+'">'+fmtPct(r['\u7d2f\u8a08\u52d5\u652f\u7387'])+'</div></div>';
  var pct = parseFloat(r['\u5e74\u5ea6\u52d5\u652f\u7387'])||0;
  var rc = rateColor(r['\u5e74\u5ea6\u52d5\u652f\u7387']);
  var bc = rc==='red'?'#c62828':rc==='orange'?'#e07b00':'#128048';
  document.getElementById('sheet-yearly').innerHTML =
    '<div class="sheet-field"><div class="sheet-field-label">\u672c\u5e74\u5ea6\u9810\u7b97</div><div class="sheet-field-val">'+fmt(r['\u672c\u5e74\u5ea6\u9810\u7b97'])+'</div></div>'+
    '<div class="sheet-field"><div class="sheet-field-label">\u5269\u9918\u53ef\u52d5\u652f\u6578</div><div class="sheet-field-val" style="color:'+(Number(r['\u5269\u9918\u53ef\u52d5\u652f\u6578'])<0?'#c62828':'#128048')+'">'+fmt(r['\u5269\u9918\u53ef\u52d5\u652f\u6578'])+'</div></div>'+
    '<div class="sheet-field"><div class="sheet-field-label">\u5e74\u5ea6\u52d5\u652f\u7387</div><div class="sheet-field-val" style="color:'+bc+'">'+fmtPct(r['\u5e74\u5ea6\u52d5\u652f\u7387'])+'</div></div>';
  document.getElementById('sheet-progress').innerHTML =
    '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;font-weight:600"><span>\u5e74\u5ea6\u52d5\u652f\u9032\u5ea6</span><span style="color:'+bc+'">'+fmtPct(r['\u5e74\u5ea6\u52d5\u652f\u7387'])+'</span></div>'+
    '<div class="progress-bar" style="height:16px;border-radius:8px"><div class="progress-fill" style="width:'+Math.min(pct,100)+'%;background:'+bc+'"></div></div>';
  document.getElementById('overlay').className = 'overlay open';
}
document.getElementById('overlay').addEventListener('click', function(e){
  if(e.target===this) this.className='overlay';
});

function renderSummary() {
  var totYB=0,totBalance=0,totRemain=0;
  RAW.forEach(function(r){
    totYB+=Number(r['\u672c\u5e74\u5ea6\u9810\u7b97'])||0;
    totBalance+=Number(r['\u672c\u6708\u9918\u984d'])||0;
    totRemain+=Number(r['\u5269\u9918\u53ef\u52d5\u652f\u6578'])||0;
  });
  var overallPct = totYB>0?(totBalance/totYB*100):0;
  var bc = overallPct>=90?'#c62828':overallPct>=70?'#e07b00':'#128048';
  document.getElementById('overview-card').innerHTML =
    '<div class="card-title">&#x1F4C8; \u6574\u9ad4\u9810\u7b97\u6982\u6cc1\uff08115\u5e744\u6708\uff09</div>'+
    '<div class="stats-grid" style="margin-top:8px">'+
      '<div class="stat-card"><div class="stat-label">\u672c\u5e74\u5ea6\u9810\u7b97\u5408\u8a08</div><div class="stat-val green">'+fmt(Math.round(totYB))+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">\u6574\u9ad4\u52d5\u652f\u7387</div><div class="stat-val" style="color:'+bc+'">'+overallPct.toFixed(2)+'%</div></div>'+
      '<div class="stat-card"><div class="stat-label">\u7d2f\u8a08\u52d5\u652f\u6578\u5408\u8a08</div><div class="stat-val blue">'+fmt(Math.round(totBalance))+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">\u5269\u9918\u53ef\u52d5\u652f\u5408\u8a08</div><div class="stat-val '+(totRemain<0?'red':'green')+'">'+fmt(Math.round(totRemain))+'</div></div>'+
    '</div>'+
    '<div class="progress-wrap" style="margin-top:12px">'+
      '<div class="progress-label"><span>\u6574\u9ad4\u5e74\u5ea6\u52d5\u652f\u9032\u5ea6</span><span style="color:'+bc+'">'+overallPct.toFixed(2)+'%</span></div>'+
      '<div class="progress-bar" style="height:14px;border-radius:7px"><div class="progress-fill" style="width:'+Math.min(overallPct,100)+'%;background:'+bc+'"></div></div>'+
    '</div>';

  var catMap = {};
  RAW.forEach(function(r){
    var c = r['\u8cbb\u7528\u5206\u985e'];
    if(!catMap[c]) catMap[c]={bal:0,yb:0};
    catMap[c].bal+=Number(r['\u672c\u6708\u9918\u984d'])||0;
    catMap[c].yb+=Number(r['\u672c\u5e74\u5ea6\u9810\u7b97'])||0;
  });
  var catBarsEl = document.getElementById('cat-bars');
  catBarsEl.innerHTML = '';
  Object.keys(catMap).sort().forEach(function(c){
    var m=catMap[c]; var pct=m.yb>0?(m.bal/m.yb*100):0;
    var cc=CAT_COLORS[c]||'#555';
    var row=document.createElement('div'); row.className='bar-row';
    row.innerHTML='<div class="bar-label">'+c+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(pct,100)+'%;background:'+cc+'"><span class="bar-pct">'+pct.toFixed(1)+'%</span></div></div>'+
      '<div class="bar-amounts">'+fmt(Math.round(m.bal))+' / '+fmt(Math.round(m.yb))+'</div>';
    catBarsEl.appendChild(row);
  });

  var unitMap2 = {};
  RAW.forEach(function(r){
    var u=r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']; if(!u) return;
    if(!unitMap2[u]) unitMap2[u]={bal:0,yb:0};
    unitMap2[u].bal+=Number(r['\u672c\u6708\u9918\u984d'])||0;
    unitMap2[u].yb+=Number(r['\u672c\u5e74\u5ea6\u9810\u7b97'])||0;
  });
  var unitBarsEl=document.getElementById('unit-bars');
  unitBarsEl.innerHTML='';
  if(Object.keys(unitMap2).length===0){
    unitBarsEl.innerHTML='<p style="font-size:13px;color:#aaa;text-align:center;padding:12px">\u7121\u79d1\u5ba4\u8cc7\u6599</p>';
  } else {
    Object.keys(unitMap2).sort().forEach(function(u){
      var m=unitMap2[u]; var pct=m.yb>0?(m.bal/m.yb*100):0;
      var uc=getUnitColor(u);
      var row=document.createElement('div'); row.className='bar-row';
      row.innerHTML='<div class="bar-label" style="font-size:11px">'+u+'</div>'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(pct,100)+'%;background:'+uc+'"><span class="bar-pct">'+pct.toFixed(1)+'%</span></div></div>'+
        '<div class="bar-amounts" style="font-size:10px">'+fmt(Math.round(m.bal))+' / '+fmt(Math.round(m.yb))+'</div>';
      unitBarsEl.appendChild(row);
    });
  }
}

function renderWarning() {
  var warns = RAW.filter(function(r){ return parseFloat(r['\u5e74\u5ea6\u52d5\u652f\u7387'])>=70; });
  warns.sort(function(a,b){ return parseFloat(b['\u5e74\u5ea6\u52d5\u652f\u7387'])-parseFloat(a['\u5e74\u5ea6\u52d5\u652f\u7387']); });
  document.getElementById('warn-count').textContent = warns.length;
  var wl=document.getElementById('warn-list'); wl.innerHTML='';
  warns.forEach(function(r){
    var pct=parseFloat(r['\u5e74\u5ea6\u52d5\u652f\u7387'])||0;
    var cls=pct>=90?'warn-red':'warn-orange';
    var pillcls=pct>=90?'red':'orange';
    var uc=getUnitColor(r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']);
    var unitPill=r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']?'<span class="warn-pill" style="background:'+uc+'1a;color:'+uc+'">'+r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']+'</span>':'';
    var div=document.createElement('div'); div.className='warn-card '+cls;
    div.innerHTML='<div class="warn-id">['+(r['\u660e\u7d30\u5e33']||'\u2014')+']</div>'+
      '<div class="warn-name">'+(r['\u6703\u8a08\u9805\u76ee']||'\u2014')+'</div>'+
      '<div class="warn-row">'+
        '<span class="warn-pill '+pillcls+'">\u5e74\u5ea6\u52d5\u652f\u7387 '+fmtPct(r['\u5e74\u5ea6\u52d5\u652f\u7387'])+'</span>'+
        '<span class="warn-pill blue">\u7d2f\u8a08\u52d5\u652f\u7387 '+fmtPct(r['\u7d2f\u8a08\u52d5\u652f\u7387'])+'</span>'+
        '<span class="warn-pill green">\u5269\u9918 '+fmt(r['\u5269\u9918\u53ef\u52d5\u652f\u6578'])+'</span>'+
        unitPill+
      '</div>';
    wl.appendChild(div);
  });
}

function renderInfo() {
  document.getElementById('info-count').textContent = RAW.length + ' \u7b46';
  document.getElementById('info-units').textContent = Object.keys(unitSet).length + ' \u500b';
  document.getElementById('info-updated').textContent = new Date().toLocaleString('zh-TW');
}

render();
renderSummary();
renderWarning();
renderInfo();
</script>
</body>
</html>
