<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f0f4f0;min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#0c6944 0%,#128048 60%,#1a9e5c 100%);color:#fff;padding:env(safe-area-inset-top) 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,80,40,.25)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding-top:max(env(safe-area-inset-top),8px)}
.header-title{font-size:17px;font-weight:700;letter-spacing:.5px}
.header-sub{font-size:12px;opacity:.85;margin-top:2px}
.badge{background:rgba(255,255,255,.22);border-radius:12px;padding:3px 10px;font-size:13px;font-weight:600}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e0ede6;position:sticky;top:calc(env(safe-area-inset-top) + 56px);z-index:90;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:80px;padding:10px 4px;font-size:13px;font-weight:600;color:#666;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:#128048;border-bottom-color:#128048}
.content{padding:12px}
.section{display:none}.section.active{display:block}
.filter-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.search-input{width:100%;border:1.5px solid #d0e8d8;border-radius:10px;padding:9px 14px;font-size:15px;outline:none;transition:border .2s}
.search-input:focus{border-color:#128048}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;transition:all .18s}
.chip.active{background:#128048;color:#fff;border-color:#128048}
.unit-chip.active{border-color:var(--uc);background:var(--uc);color:#fff}
.label-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.pill{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#e8f5e9;color:#1b5e20}
.pill-rm{cursor:pointer;opacity:.7;font-size:14px}
.notice{background:#fffde7;border:1.5px solid #f9a825;border-radius:10px;padding:9px 13px;font-size:12.5px;color:#7a5c00;margin-bottom:12px;line-height:1.5}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:#fff;border-radius:14px;padding:12px;box-shadow:0 1px 5px rgba(0,0,0,.07)}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:700;color:#128048}
.result-count{font-size:13px;color:#666;margin-bottom:8px;padding:0 2px}
.item-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s,box-shadow .15s}
.item-card:active{transform:scale(.98);box-shadow:0 2px 10px rgba(0,0,0,.12)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-code{font-size:13px;color:#888;font-weight:600}
.card-name{font-size:15px;font-weight:700;color:#1a2e1a;flex:1}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.cat-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.unit-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid #f0f4f0;padding-top:8px}
.card-cell{}
.cell-label{font-size:11px;color:#999}
.cell-val{font-size:15px;font-weight:700}
.cell-val.blue{color:#1565c0}
.cell-val.green{color:#128048}
.cell-val.red{color:#c62828}
.cell-val.orange{color:#e07b00}
.progress-bar-wrap{margin-top:8px;border-top:1px solid #f0f4f0;padding-top:8px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px}
.progress-track{height:8px;background:#e8f5e9;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:12px}
.page-btn{padding:8px 18px;border-radius:10px;border:1.5px solid #128048;background:#fff;color:#128048;font-size:14px;font-weight:600;cursor:pointer}
.page-btn:disabled{opacity:.4;cursor:default}
.page-info{padding:8px;font-size:13px;color:#666;align-self:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background .25s}
.overlay.open{background:rgba(0,0,0,.45);pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:201}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:18px;font-weight:700;color:#1a2e1a;margin-bottom:4px}
.sheet-sub{font-size:13px;color:#888;margin-bottom:14px}
.sheet-section{margin-bottom:14px}
.sheet-sec-label{font-size:12px;color:#128048;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.sheet-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5}
.sheet-row:last-child{border-bottom:none}
.sr-label{font-size:13px;color:#888}
.sr-val{font-size:14px;font-weight:700;color:#1a2e1a}
.summary-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.sum-title{font-size:16px;font-weight:700;color:#128048;margin-bottom:12px}
.bar-row{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-track{height:12px;background:#e8f5e9;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px}
.warn-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.08);border-left:4px solid #e07b00}
.warn-card.danger{border-left-color:#c62828}
.warn-title{font-size:14px;font-weight:700;color:#1a2e1a;margin-bottom:4px}
.warn-sub{font-size:12px;color:#888}
.warn-rate{font-size:20px;font-weight:800;color:#e07b00}
.warn-rate.danger{color:#c62828}
.info-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.07)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
.info-row:last-child{border-bottom:none}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0ede6;display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:90}
.bot-btn{flex:1;padding:10px 4px 6px;font-size:11px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.bot-btn.active{color:#128048}
.bot-icon{font-size:20px;line-height:1}
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:15px}
.upload-overlay{position:fixed;inset:0;background:#f1f8f4;display:flex;align-items:center;justify-content:center;z-index:999}
.upload-box{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.12);max-width:320px;width:90%}
.upload-icon{font-size:48px;margin-bottom:12px}
.upload-title{font-size:20px;font-weight:700;color:#1a2e1a;margin-bottom:6px}
.upload-sub{font-size:14px;color:#888;margin-bottom:20px}
.upload-btn-label{display:inline-block;background:#128048;color:#fff;border-radius:10px;padding:10px 24px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.upload-hint{font-size:12px;color:#aaa;margin-top:8px}
.upload-err{color:#c62828;font-size:13px;margin-top:8px}
</style>
</head>

  <div class="upload-box">
    <div class="upload-icon">📂</div>
    <div class="upload-title">載入預算資料</div>
    <div class="upload-sub">請選擇 budget.csv 檔案</div>

  <button class="bot-btn" data-tab="warning"><span class="bot-icon">⚠️</span>預警</button>
  <button class="bot-btn" data-tab="info"><span class="bot-icon">ℹ️</span>資訊</button>

<script>
var RAW = [];
var CAT_COLORS = {"人事費": "#1b5e20", "業務外包": "#0d47a1", "業務成本": "#e65100", "專案建置成本": "#6a1b9a", "設備及折舊": "#880e4f", "管銷費用": "#006064", "其他": "#424242"};
var UNIT_COLORS = {"人發駐點": "#0d6efd", "企業客戶科": "#198754", "供應科": "#fd7e14", "會計駐點": "#dc3545", "服務中心": "#6f42c1", "第一客戶網路中心": "#20c997", "第二客戶網路中心": "#0dcaf0", "網路維運中心": "#ffc107", "職業安全衛生科": "#e83e8c", "行政管理科": "#6610f2", "行銷科": "#495057", "規劃設計科": "#6c757d", "資通科": "#17a2b8"};

var PAGE_SIZE = 20;
var curPage = 1;
var curKw = '';
var curCat = 'all';
var curUnit = 'all';
var filtered = [];

// ─── Tab 切換 ───────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab-btn,.bot-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === t);
  });
  document.querySelectorAll('.section').forEach(function(s) {
    s.classList.toggle('active', s.id === 'tab-' + t);
  });
  if (t === 'summary') renderSummary();
  if (t === 'warning') renderWarning();
}
document.querySelectorAll('.tab-btn,.bot-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
});

// ─── 費用分類 & 科室 Chips (built after CSV load) ───────────────
function buildChips() {
  var catSet = {};
  RAW.forEach(function(r) { if (r['費用分類']) catSet[r['費用分類']] = true; });
  var CATS = ['all'].concat(Object.keys(catSet).sort());
  var catWrap = document.getElementById('cat-chips');
  catWrap.innerHTML = '';
  CATS.forEach(function(c) {
    var chip = document.createElement('button');
    chip.className = 'chip' + (c === 'all' ? ' active' : '');
    chip.textContent = c === 'all' ? '全部' : c;
    chip.dataset.cat = c;
    chip.addEventListener('click', function() {
      curCat = this.dataset.cat;
      curPage = 1;
      document.querySelectorAll('#cat-chips .chip').forEach(function(ch) {
        ch.classList.toggle('active', ch.dataset.cat === curCat);
      });
      updatePills(); applyFilter();
    });
    catWrap.appendChild(chip);
  });

  var unitSet = {};
  RAW.forEach(function(r) { if (r['預算主管單位']) unitSet[r['預算主管單位']] = true; });
  var UNITS = ['all'].concat(Object.keys(unitSet).sort());
  var unitWrap = document.getElementById('unit-chips');
  unitWrap.innerHTML = '';
  UNITS.forEach(function(u) {
    var chip = document.createElement('button');
    chip.className = 'chip' + (u === 'all' ? ' active' : ' unit-chip');
    chip.textContent = u === 'all' ? '全部' : u;
    chip.dataset.unit = u;
    var uc = u === 'all' ? '#128048' : (UNIT_COLORS[u] || '#128048');
    if (u !== 'all') chip.style.setProperty('--uc', uc);
    chip.addEventListener('click', function() {
      curUnit = this.dataset.unit;
      curPage = 1;
      document.querySelectorAll('#unit-chips .chip').forEach(function(ch) {
        ch.classList.toggle('active', ch.dataset.unit === curUnit);
      });
      updatePills(); applyFilter();
    });
    unitWrap.appendChild(chip);
  });
}

// ─── 搜尋框 ─────────────────────────────────────────────────────
document.getElementById('kw-input').addEventListener('input', function() {
  curKw = this.value.trim();
  curPage = 1;
  updatePills(); applyFilter();
});

// ─── Pills ──────────────────────────────────────────────────────
function updatePills() {
  var pillWrap = document.getElementById('active-pills');
  pillWrap.innerHTML = '';
  function addPill(label, color, onRm) {
    var pill = document.createElement('div');
    pill.className = 'pill';
    pill.style.background = color + '22';
    pill.style.color = color;
    pill.innerHTML = label;
    var rm = document.createElement('span');
    rm.className = 'pill-rm';
    rm.textContent = '✕';
    rm.addEventListener('click', onRm);
    pill.appendChild(rm);
    pillWrap.appendChild(pill);
  }
  if (curKw) addPill('🔍 ' + curKw, '#1565c0', function() {
    curKw = ''; document.getElementById('kw-input').value = '';
    curPage = 1; updatePills(); applyFilter();
  });
  if (curCat !== 'all') addPill('📂 ' + curCat, CAT_COLORS[curCat] || '#128048', function() {
    curCat = 'all'; curPage = 1;
    document.querySelectorAll('#cat-chips .chip').forEach(function(ch) {
      ch.classList.toggle('active', ch.dataset.cat === 'all');
    });
    updatePills(); applyFilter();
  });
  if (curUnit !== 'all') addPill('🏷 ' + curUnit, UNIT_COLORS[curUnit] || '#128048', function() {
    curUnit = 'all'; curPage = 1;
    document.querySelectorAll('#unit-chips .chip').forEach(function(ch) {
      ch.classList.toggle('active', ch.dataset.unit === 'all');
    });
    updatePills(); applyFilter();
  });
}

// ─── 篩選 & 渲染 ────────────────────────────────────────────────
function fmt(n) {
  if (n === '' || n === null || n === undefined) return '—';
  return Number(n).toLocaleString();
}
function pctColor(v) {
  if (v >= 90) return 'red';
  if (v >= 70) return 'orange';
  return 'green';
}

function applyFilter() {
  filtered = RAW.filter(function(r) {
    var kw = curKw.toLowerCase();
    var kwOk = !kw || r['明細帳'].toLowerCase().includes(kw) || r['會計項目'].toLowerCase().includes(kw);
    var catOk = curCat === 'all' || r['費用分類'] === curCat;
    var unitOk = curUnit === 'all' || r['預算主管單位'] === curUnit;
    return kwOk && catOk && unitOk;
  });
  renderStats();
  renderList();
  renderPagination();
}

function renderStats() {
  var totalBal = 0, totalBgt = 0, totalYBgt = 0, totalRem = 0;
  filtered.forEach(function(r) {
    totalBal  += Number(r['本月餘額'])    || 0;
    totalBgt  += Number(r['本月預算數'])  || 0;
    totalYBgt += Number(r['本年度預算'])  || 0;
    totalRem  += Number(r['剩餘可動支數'])|| 0;
  });
  document.getElementById('stats-grid').innerHTML =
    '<div class="stat-card"><div class="stat-label">本月餘額（累計）</div><div class="stat-val" style="font-size:15px">' + fmt(totalBal) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">本月預算數</div><div class="stat-val" style="font-size:15px">' + fmt(totalBgt) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">本年度預算</div><div class="stat-val" style="font-size:15px">' + fmt(totalYBgt) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">剩餘可動支數</div><div class="stat-val" style="font-size:15px;color:' + (totalRem < 0 ? '#c62828' : '#128048') + '">' + fmt(totalRem) + '</div></div>';
  document.getElementById('result-count').textContent = '共 ' + filtered.length + ' 筆';
  document.getElementById('total-badge').textContent = filtered.length + ' 筆';
}

function renderList() {
  var wrap = document.getElementById('list-wrap');
  wrap.innerHTML = '';
  var start = (curPage - 1) * PAGE_SIZE;
  var pageItems = filtered.slice(start, start + PAGE_SIZE);
  if (!pageItems.length) {
    wrap.innerHTML = '<div class="empty">無符合條件的資料</div>';
    return;
  }
  pageItems.forEach(function(r) {
    var yr = Number(r['年度動支率']) || 0;
    var ar = Number(r['累計動支率']) || 0;
    var rem = Number(r['剩餘可動支數']);
    var catColor = CAT_COLORS[r['費用分類']] || '#424242';
    var uc = r['預算主管單位'] ? (UNIT_COLORS[r['預算主管單位']] || '#128048') : null;
    var unitBadge = uc
      ? '<span class="unit-badge" style="background:' + uc + '1a;color:' + uc + ';border:1px solid ' + uc + '44">' + r['預算主管單位'] + '</span>'
      : '';
    var fillColor = yr >= 90 ? '#c62828' : yr >= 70 ? '#e07b00' : '#128048';
    var fillPct = Math.min(yr, 100);
    var card = document.createElement('div');
    card.className = 'item-card';
    card.dataset.acc = r['明細帳'];
    card.innerHTML =
      '<div class="card-head">' +
        '<div style="flex:1">' +
          '<div class="card-code">' + r['明細帳'] + '</div>' +
          '<div class="card-name">' + r['會計項目'] + '</div>' +
          '<div class="badges">' +
            '<span class="cat-badge" style="background:' + catColor + '1a;color:' + catColor + ';border:1px solid ' + catColor + '44">' + r['費用分類'] + '</span>' +
            unitBadge +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-grid">' +
        '<div class="card-cell"><div class="cell-label">本月餘額（累計）</div><div class="cell-val blue">' + fmt(r['本月餘額']) + '</div></div>' +
        '<div class="card-cell"><div class="cell-label">累計動支率</div><div class="cell-val ' + pctColor(ar) + '">' + (ar || 0) + '%</div></div>' +
        '<div class="card-cell"><div class="cell-label">本年度預算</div><div class="cell-val">' + fmt(r['本年度預算']) + '</div></div>' +
        '<div class="card-cell"><div class="cell-label">剩餘可動支數</div><div class="cell-val ' + (rem < 0 ? 'red' : 'green') + '">' + fmt(rem) + '</div></div>' +
      '</div>' +
      '<div class="progress-bar-wrap">' +
        '<div class="progress-label"><span>年度動支率</span><span style="color:' + fillColor + ';font-weight:700">' + yr + '%</span></div>' +
        '<div class="progress-track"><div class="progress-fill" style="width:' + fillPct + '%;background:' + fillColor + '"></div></div>' +
      '</div>';
    card.addEventListener('click', function() { openSheet(this.dataset.acc); });
    wrap.appendChild(card);
  });
}

function renderPagination() {
  var pages = Math.ceil(filtered.length / PAGE_SIZE);
  var pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (pages <= 1) return;
  var prev = document.createElement('button');
  prev.className = 'page-btn'; prev.textContent = '◀ 上頁'; prev.disabled = curPage <= 1;
  prev.addEventListener('click', function() { curPage--; renderList(); renderPagination(); window.scrollTo(0,0); });
  pg.appendChild(prev);
  var info = document.createElement('span');
  info.className = 'page-info'; info.textContent = curPage + ' / ' + pages;
  pg.appendChild(info);
  var next = document.createElement('button');
  next.className = 'page-btn'; next.textContent = '下頁 ▶'; next.disabled = curPage >= pages;
  next.addEventListener('click', function() { curPage++; renderList(); renderPagination(); window.scrollTo(0,0); });
  pg.appendChild(next);
}

// ─── 底部 Sheet ─────────────────────────────────────────────────
function openSheet(acc) {
  var r = RAW.find(function(x) { return x['明細帳'] === acc; });
  if (!r) return;
  var yr = Number(r['年度動支率']) || 0;
  var fillColor = yr >= 90 ? '#c62828' : yr >= 70 ? '#e07b00' : '#128048';
  document.getElementById('sheet-title').textContent = r['會計項目'];
  document.getElementById('sheet-sub').textContent = r['明細帳'] + (r['預算主管單位'] ? '  ·  ' + r['預算主管單位'] : '');
  document.getElementById('sheet-body').innerHTML =
    '<div class="sheet-section">' +
      '<div class="sheet-sec-label">本月數據</div>' +
      '<div class="sheet-row"><span class="sr-label">本月餘額（累計）</span><strong class="sr-val" style="color:#1565c0">' + fmt(r['本月餘額']) + '</strong></div>' +
      '<div class="sheet-row"><span class="sr-label">本月動支數</span><strong class="sr-val">' + fmt(r['本月動支數']) + '</strong></div>' +
      '<div class="sheet-row"><span class="sr-label">本月預算數</span><strong class="sr-val">' + fmt(r['本月預算數']) + '</strong></div>' +
      '<div class="sheet-row"><span class="sr-label">至本月預算數累計</span><strong class="sr-val">' + fmt(r['至本月預算數累計']) + '</strong></div>' +
      '<div class="sheet-row"><span class="sr-label">累計動支率</span><strong class="sr-val" style="color:' + (Number(r['累計動支率'])>=90?'#c62828':Number(r['累計動支率'])>=70?'#e07b00':'#128048') + '">' + (r['累計動支率']||0) + '%</strong></div>' +
    '</div>' +
    '<div class="sheet-section">' +
      '<div class="sheet-sec-label">年度數據</div>' +
      '<div class="sheet-row"><span class="sr-label">本年度預算</span><strong class="sr-val">' + fmt(r['本年度預算']) + '</strong></div>' +
      '<div class="sheet-row"><span class="sr-label">剩餘可動支數</span><strong class="sr-val" style="color:' + (Number(r['剩餘可動支數'])<0?'#c62828':'#128048') + '">' + fmt(r['剩餘可動支數']) + '</strong></div>' +
      '<div class="sheet-row"><span class="sr-label">年度動支率</span><strong class="sr-val" style="color:' + fillColor + '">' + yr + '%</strong></div>' +
    '</div>' +
    '<div class="sheet-section">' +
      '<div class="sheet-sec-label">年度動支進度</div>' +
      '<div class="progress-track" style="height:14px">' +
        '<div class="progress-fill" style="width:' + Math.min(yr,100) + '%;background:' + fillColor + '"></div>' +
      '</div>' +
      '<div style="text-align:right;margin-top:4px;font-size:13px;color:' + fillColor + ';font-weight:700">' + yr + '%</div>' +
    '</div>';
  document.getElementById('overlay').className = 'overlay open';
}
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) this.className = 'overlay';
});

// ─── 費用摘要 ────────────────────────────────────────────────────
function renderSummary() {
  var wrap = document.getElementById('summary-content');
  if (wrap.dataset.rendered) return;
  wrap.dataset.rendered = '1';

  var totalYBgt = 0, totalRem = 0, totalBal = 0;
  RAW.forEach(function(r) {
    totalYBgt += Number(r['本年度預算']) || 0;
    totalRem  += Number(r['剩餘可動支數']) || 0;
    totalBal  += Number(r['本月餘額']) || 0;
  });
  var usedTotal = totalYBgt - totalRem;
  var usedPct = totalYBgt ? Math.round(usedTotal / totalYBgt * 100) : 0;
  var fc = usedPct >= 90 ? '#c62828' : usedPct >= 70 ? '#e07b00' : '#128048';

  var html = '<div class="summary-card"><div class="sum-title">整體預算概況</div>' +
    '<div class="bar-row"><div class="bar-label"><span>整體年度動支率</span><span style="color:' + fc + ';font-weight:700">' + usedPct + '%</span></div>' +
    '<div class="bar-track"><div class="bar-fill" style="width:' + Math.min(usedPct,100) + '%;background:' + fc + '"></div></div></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">' +
    '<div><div style="font-size:11px;color:#999">本年度預算</div><div style="font-weight:700;font-size:16px">' + fmt(totalYBgt) + '</div></div>' +
    '<div><div style="font-size:11px;color:#999">剩餘可動支</div><div style="font-weight:700;font-size:16px;color:' + (totalRem<0?'#c62828':'#128048') + '">' + fmt(totalRem) + '</div></div>' +
    '</div></div>';

  // 各費用分類橫條圖
  var catMap = {};
  RAW.forEach(function(r) {
    var c = r['費用分類'];
    if (!catMap[c]) catMap[c] = {yBgt:0, rem:0};
    catMap[c].yBgt += Number(r['本年度預算']) || 0;
    catMap[c].rem  += Number(r['剩餘可動支數']) || 0;
  });
  html += '<div class="summary-card"><div class="sum-title">各費用分類動支率</div>';
  Object.keys(catMap).sort().forEach(function(cat) {
    var m = catMap[cat];
    var used = m.yBgt - m.rem;
    var pct = m.yBgt ? Math.round(used / m.yBgt * 100) : 0;
    var cc = CAT_COLORS[cat] || '#424242';
    var fc2 = pct >= 90 ? '#c62828' : pct >= 70 ? '#e07b00' : '#128048';
    html += '<div class="bar-row"><div class="bar-label">' +
      '<span style="color:' + cc + ';font-weight:600">' + cat + '</span>' +
      '<span style="font-size:12px;color:#888">' + fmt(m.yBgt) + ' | <strong style="color:' + fc2 + '">' + pct + '%</strong></span></div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + Math.min(pct,100) + '%;background:' + fc2 + '"></div></div></div>';
  });
  html += '</div>';

  // 各科室動支率橫條圖
  var unitMap = {};
  RAW.forEach(function(r) {
    if (!r['預算主管單位']) return;
    var u = r['預算主管單位'];
    if (!unitMap[u]) unitMap[u] = {yBgt:0, rem:0};
    unitMap[u].yBgt += Number(r['本年度預算']) || 0;
    unitMap[u].rem  += Number(r['剩餘可動支數']) || 0;
  });
  html += '<div class="summary-card"><div class="sum-title">各科室動支率</div>';
  Object.keys(unitMap).sort().forEach(function(u) {
    var m = unitMap[u];
    var used = m.yBgt - m.rem;
    var pct = m.yBgt ? Math.round(used / m.yBgt * 100) : 0;
    var uc2 = UNIT_COLORS[u] || '#128048';
    var fc3 = pct >= 90 ? '#c62828' : pct >= 70 ? '#e07b00' : '#128048';
    html += '<div class="bar-row"><div class="bar-label">' +
      '<span style="color:' + uc2 + ';font-weight:600">' + u + '</span>' +
      '<span style="font-size:12px;color:#888">' + fmt(m.yBgt) + ' | <strong style="color:' + fc3 + '">' + pct + '%</strong></span></div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + Math.min(pct,100) + '%;background:' + fc3 + '"></div></div></div>';
  });
  html += '</div>';

  wrap.innerHTML = html;
}

// ─── 高用率預警 ─────────────────────────────────────────────────
function renderWarning() {
  var wrap = document.getElementById('warning-content');
  if (wrap.dataset.rendered) return;
  wrap.dataset.rendered = '1';
  var warns = RAW.filter(function(r) { return Number(r['年度動支率']) >= 70; })
    .sort(function(a,b) { return Number(b['年度動支率']) - Number(a['年度動支率']); });
  if (!warns.length) { wrap.innerHTML = '<div class="empty">目前無高用率項目</div>'; return; }
  var html = '<div style="font-size:13px;color:#888;margin-bottom:10px">年度動支率 ≥ 70% 共 ' + warns.length + ' 筆</div>';
  warns.forEach(function(r) {
    var yr = Number(r['年度動支率']);
    var isDanger = yr >= 90;
    var uc3 = r['預算主管單位'] ? (UNIT_COLORS[r['預算主管單位']] || '#128048') : null;
    var unitTag = uc3
      ? '<span class="unit-badge" style="background:' + uc3 + '1a;color:' + uc3 + ';border:1px solid ' + uc3 + '44;margin-left:6px">' + r['預算主管單位'] + '</span>'
      : '';
    html += '<div class="warn-card' + (isDanger ? ' danger' : '') + '">' +
      '<div class="warn-title">' + r['會計項目'] + unitTag + '</div>' +
      '<div class="warn-sub">' + r['明細帳'] + ' | 剩餘：' + fmt(r['剩餘可動支數']) + '</div>' +
      '<div class="warn-rate' + (isDanger ? ' danger' : '') + '">' + yr + '%</div>' +
      '</div>';
  });
  wrap.innerHTML = html;
}

// ─── CSV Parser ──────────────────────────────────────────────────
function parseCSVRow(line) {
  var cells = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      cells.push(cur.trim()); cur = '';
    } else { cur += c; }
  }
  cells.push(cur.trim());
  return cells;
}

var NUM_FIELDS = ['本月動支數','本月餘額','本月預算數','至本月預算數累計','累計動支率','本年度預算','年度動支率','剩餘可動支數'];

function parseCSV(text) {
  var lines = text.split(/\r?\n/);
  var meta = {}, dataStart = 0;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    if (line.charAt(0) === '#') {
      line.substring(1).split(',').forEach(function(p) {
        var idx = p.indexOf(':');
        if (idx > 0) meta[p.substring(0, idx).trim()] = p.substring(idx + 1).trim();
      });
      dataStart = i + 1;
    } else { break; }
  }
  var remaining = lines.slice(dataStart).filter(function(l) { return l.trim(); });
  if (!remaining.length) return { meta: meta, rows: [] };
  var headers = parseCSVRow(remaining[0]);
  var rows = [];
  for (var j = 1; j < remaining.length; j++) {
    var cells = parseCSVRow(remaining[j]);
    var obj = {};
    headers.forEach(function(h, idx) {
      var val = (cells[idx] !== undefined ? cells[idx] : '').trim();
      obj[h] = (NUM_FIELDS.indexOf(h) !== -1 && val !== '') ? Number(val) : val;
    });
    rows.push(obj);
  }
  return { meta: meta, rows: rows };
}

// ─── 初始化 App ─────────────────────────────────────────────────
var curMeta = {};

function initApp(parsed, filename) {
  RAW = parsed.rows;
  curMeta = parsed.meta;
  curPage = 1; curKw = ''; curCat = 'all'; curUnit = 'all';

  var org   = curMeta['機關']  || '';
  var year  = curMeta['年度']  || '';
  var month = curMeta['月份']  || '';
  var src   = curMeta['來源']  || filename || '';

  var sub = [org, year ? year + '年' + (month ? month + '月' : '') : ''].filter(Boolean).join(' | ');
  document.getElementById('header-sub').textContent = sub || '預算管理系統';
  if (year) document.title = '預算管理 ' + year + '年' + (month ? month + '月' : '');

  var yEl = document.getElementById('info-year');
  var mEl = document.getElementById('info-month');
  var cEl = document.getElementById('info-count');
  var sEl = document.getElementById('info-source');
  if (yEl) yEl.textContent = year ? year + ' 年' : '—';
  if (mEl) mEl.textContent = month ? month + ' 月' : '—';
  if (cEl) cEl.textContent = RAW.length + ' 筆';
  if (sEl) sEl.textContent = src || '—';

  // Reset summary / warning cache
  var sw = document.getElementById('summary-content');
  var ww = document.getElementById('warning-content');
  if (sw) delete sw.dataset.rendered;
  if (ww) delete ww.dataset.rendered;

  buildChips();
  updatePills();
  applyFilter();
  document.getElementById('upload-overlay').style.display = 'none';
}

function loadCSVText(text, filename) {
  try {
    var parsed = parseCSV(text);
    if (!parsed.rows.length) throw new Error('CSV 無資料列');
    initApp(parsed, filename);
  } catch(e) {
    showUploadError('解析錯誤：' + e.message);
  }
}

function showUploadError(msg) {
  var el = document.getElementById('upload-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('upload-hint').style.display = 'none';
  document.getElementById('upload-overlay').style.display = 'flex';
}

function handleFileInput(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { loadCSVText(e.target.result, file.name); };
  reader.onerror = function() { showUploadError('檔案讀取失敗'); };
  reader.readAsText(file, 'UTF-8');
}

document.getElementById('csv-file-input').addEventListener('change', function() {
  handleFileInput(this.files[0]);
});
document.getElementById('csv-reload-input').addEventListener('change', function() {
  handleFileInput(this.files[0]);
});

// ─── 自動載入 budget.csv ────────────────────────────────────────
fetch('budget.csv')
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(function(text) { loadCSVText(text, 'budget.csv'); })
  .catch(function() {
    document.getElementById('upload-hint').textContent = '找不到 budget.csv，請手動選擇檔案。';
  });
</script>
