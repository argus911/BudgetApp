<title>預算管理 115年 3月</title>
<style>
:root{
  --bg:#f2f2f7;--card:#fff;--nav:#1a3a5c;--accent:#0d5fa6;
  --text:#1c1c1e;--sub:#8e8e93;--border:#e5e5ea;
  --orange:#ff9500;--red:#ff3b30;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);padding-bottom:env(safe-area-inset-bottom);}
.nav{background:var(--nav);padding:calc(env(safe-area-inset-top)+12px) 16px 12px;position:sticky;top:0;z-index:100;}
.nav-title{color:#fff;font-size:17px;font-weight:600;text-align:center;}
.nav-sub{color:rgba(255,255,255,.7);font-size:11px;text-align:center;margin-top:2px;}
.segment{display:flex;background:rgba(255,255,255,.15);border-radius:8px;margin:10px 0 0;padding:2px;}
.seg-btn{flex:1;text-align:center;padding:5px 4px;border-radius:6px;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;transition:all .2s;}
.seg-btn.active{background:#fff;color:var(--nav);font-weight:600;}
.filters{padding:12px 16px 0;}
.lbl{font-size:11px;color:var(--sub);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.fcard{background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.frow{display:flex;align-items:center;padding:11px 14px;border-bottom:.5px solid var(--border);cursor:pointer;}
.frow:last-child{border-bottom:none;}
.ficon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:14px;flex-shrink:0;}
.flabel{flex:1;font-size:14px;color:var(--text);}
.fval{font-size:13px;color:var(--sub);margin-right:6px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fval.on{color:var(--accent);font-weight:500;}
.chevron{color:#c7c7cc;font-size:14px;}
.col-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.chip{background:var(--card);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.chip.on{background:#e8f4fd;}
.chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;}
.chip.on .chk{background:var(--accent);border-color:var(--accent);color:#fff;}
.clabel{font-size:12px;color:var(--text);line-height:1.2;}
.chip.on .clabel{color:var(--accent);font-weight:500;}
.qbtn{margin:0 0 16px;background:var(--accent);border-radius:var(--radius);padding:14px;text-align:center;color:#fff;font-size:15px;font-weight:600;cursor:pointer;border:none;width:100%;}
.qbtn:active{opacity:.85;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sbox{background:var(--card);border-radius:10px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.slabel{font-size:10px;color:var(--sub);margin-bottom:3px;}
.sval{font-size:14px;font-weight:600;}
.sval.blue{color:var(--accent);}
.sval.orange{color:var(--orange);}
.rcnt{font-size:12px;color:var(--sub);}
.rcard{background:var(--card);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.rhdr{background:var(--nav);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.rttl{color:#fff;font-size:12px;font-weight:600;flex:1;margin-right:8px;}
.rbadge{background:rgba(255,255,255,.2);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.rrow{display:flex;justify-content:space-between;align-items:baseline;padding:8px 12px;border-bottom:.5px solid var(--border);}
.rrow:last-child{border-bottom:none;}
.rfield{font-size:11px;color:var(--sub);flex:1;}
.rval{font-size:12px;color:var(--text);font-weight:500;text-align:right;max-width:60%;}
.rval.blue{color:var(--accent);}
.rval.red{color:var(--red);}
.rval.orange{color:var(--orange);}
.rwrap{padding:6px 12px 2px;}
.rrate{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
.rbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.rfill{height:100%;border-radius:3px;background:var(--accent);}
.rfill.warn{background:var(--orange);}
.rfill.danger{background:var(--red);}
.tabbar{background:var(--card);border-top:.5px solid var(--border);display:flex;padding:8px 0 calc(env(safe-area-inset-bottom)+4px);position:fixed;bottom:0;left:0;right:0;z-index:100;}
.titem{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.ticon{font-size:20px;}
.tlabel{font-size:9px;color:var(--sub);}
.titem.active .tlabel{color:var(--accent);}
.sovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;}
.sovl.open{display:flex;align-items:flex-end;}
.sheet{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-height:72vh;overflow-y:auto;}
.shdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;border-bottom:.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1;}
.sttl{font-size:16px;font-weight:600;}
.sclose{color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;padding:4px 8px;}
.sopt{padding:14px 16px;border-bottom:.5px solid var(--border);font-size:16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.sopt:last-child{border-bottom:none;}
.sopt.sel{color:var(--accent);font-weight:500;}
.sopt-check{color:var(--accent);font-size:16px;font-weight:700;}
.ssearch{padding:8px 16px 10px;position:sticky;top:56px;background:var(--bg);z-index:1;border-bottom:.5px solid var(--border);}
.ssearch input{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;background:#fff;color:var(--text);outline:none;}
.ssearch input:focus{border-color:var(--accent);}
.snone{text-align:center;padding:24px;color:var(--sub);font-size:14px;}
.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.mc{padding-bottom:80px;}
.page{display:none;}
.page.active{display:block;}
.awrap{padding:20px 16px;}
.acard{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.arow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--border);font-size:13px;}
.arow:last-child{border-bottom:none;}
.akey{color:var(--sub);}
.aval{font-weight:500;}
</style>

}
function filterSheet(q){
  q=q.trim();
  if(!q){renderSheetList(sheetOptions);return;}
  var ql=q.toLowerCase();
  var filtered=['\u5168\u90e8'].concat(sheetOptions.slice(1).filter(function(o){return o.toLowerCase().indexOf(ql)>=0;}));
  renderSheetList(filtered);
}
function closeSheet(e){if(e&&e.target!==document.getElementById('sovl'))return;document.getElementById('sovl').classList.remove('open');}

function runQuery(){
  document.getElementById('ssec').style.display='none';
  document.getElementById('rsec').style.display='none';
  var rows=RAW.filter(function(r){
    if(fUnit&&String(r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']||'').trim()!==fUnit)return false;
    if(fSubacc&&String(r['\u660e\u7d30\u5e33']||'').trim()!==fSubacc)return false;
    return true;
  });
  var slbls={'\u672c\u6708\u9918\u984d':'\u672c\u6708\u9918\u984d','\u672c\u6708\u9810\u7b97\u6578':'\u672c\u6708\u9810\u7b97\u6578','\u7d2f\u8a08\u52d5\u652f\u7387%':'\u7d2f\u8a08\u52d5\u652f\u7387','\u5269\u9918\u53ef\u52d5\u652f':'\u5269\u9918\u53ef\u52d5\u652f'};
  var sumKeys=['\u672c\u6708\u9918\u984d','\u672c\u6708\u9810\u7b97\u6578','\u7d2f\u8a08\u52d5\u652f\u7387%','\u5269\u9918\u53ef\u52d5\u652f'];
  document.getElementById('sgrid').innerHTML=sumKeys.filter(function(k){return selCols.indexOf(k)>=0;}).map(function(k){
    var vals=rows.map(function(r){return Number(r[k]);}).filter(function(n){return !isNaN(n);});
    var disp,cls;
    if(k==='\u7d2f\u8a08\u52d5\u652f\u7387%'){var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;disp=avg.toFixed(2)+'%';cls=avg>=80?'orange':'blue';}
    else{var tot=vals.reduce(function(a,b){return a+b;},0);disp=tot.toLocaleString('zh-TW');cls='blue';}
    return '<div class="sbox"><div class="slabel">'+slbls[k]+'</div><div class="sval '+cls+'">'+disp+'</div></div>';
  }).join('');
  document.getElementById('ssec').style.display='block';

  var maxDisplay=100;
  document.getElementById('rcnt').textContent='\u5171 '+rows.length+' \u7b46';
  var rlist=document.getElementById('rlist');
  if(!rows.length){rlist.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:8px;">&#128269;</div><div>\u67e5\u7121\u8cc7\u6599</div></div>';document.getElementById('rsec').style.display='block';return;}
  var showCols=COLS.filter(function(c){return selCols.indexOf(c.k)>=0;});
  var html=rows.slice(0,maxDisplay).map(function(row){
    var sub=String(row['\u660e\u7d30\u5e33']||'').trim();
    var name=String(row['\u6703\u8a08\u9805\u76ee']||'');
    var unit=String(row['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']||'').trim();
    var rate=Number(row['\u7d2f\u8a08\u52d5\u652f\u7387%']);
    var showR=selCols.indexOf('\u7d2f\u8a08\u52d5\u652f\u7387%')>=0&&!isNaN(rate);
    var rw=isNaN(rate)?0:Math.min(Math.abs(rate),120);
    var rcls=rate>=100?'danger':(rate>=80?'warn':'');
    var drows=showCols.filter(function(c){return c.k!=='\u660e\u7d30\u5e33'&&c.k!=='\u6703\u8a08\u9805\u76ee';}).map(function(c){
      var v=row[c.k],d=c.pct?fmtP(v):fmt(v);
      return '<div class="rrow"><div class="rfield">'+c.lb+'</div><div class="rval '+colorCls(c,v)+'">'+d+'</div></div>';
    }).join('');
    var sh=name.length>20?name.slice(0,20)+'\u2026':name;
    var bdg=unit?'<div class="rbadge">'+unit+'</div>':'';
    var rbar='';
    if(showR){var rc=rate>=100?'var(--red)':(rate>=80?'var(--orange)':'var(--accent)');
      rbar='<div class="rwrap"><div class="rrate"><span style="color:var(--sub)">\u7d2f\u8a08\u52d5\u652f\u7387</span><span style="color:'+rc+'">'+rate.toFixed(2)+'%</span></div><div class="rbar"><div class="rfill '+rcls+'" style="width:'+rw+'%"></div></div></div>';}
    return '<div class="rcard"><div class="rhdr"><div class="rttl">'+sub+' '+sh+'</div>'+bdg+'</div>'+rbar+drows+'</div>';
  }).join('');
  if(rows.length>maxDisplay)html+='<div style="text-align:center;padding:10px;color:var(--sub);font-size:12px;">\uff08\u50c5\u986f\u793a\u524d '+maxDisplay+' \u7b46\uff0c\u5171 '+rows.length+' \u7b46\uff09</div>';
  rlist.innerHTML=html;
  document.getElementById('rsec').style.display='block';
  document.getElementById('rsec').scrollIntoView({behavior:'smooth',block:'start'});
}

function switchPage(name){
  ['query','about'].forEach(function(p){document.getElementById('pg-'+p).classList.toggle('active',p===name);});
  document.querySelectorAll('.titem').forEach(function(t,i){t.classList.toggle('active',(name==='query'&&i===0)||(name==='about'&&i===1));});
  document.querySelectorAll('.seg-btn').forEach(function(b,i){b.classList.toggle('active',(name==='query'&&i===0)||(name==='about'&&i===1));});
}

function initAbout(){
  document.getElementById('alist').innerHTML=UNITS.map(function(u){
    var n=RAW.filter(function(r){return String(r['\u9810\u7b97\u4e3b\u7ba1\u55ae\u4f4d']||'').trim()===u;}).length;
    return '<div class="arow"><span class="akey">'+u+'</span><span class="aval">'+n+' \u7b46</span></div>';
  }).join('');
}

initChips();
initAbout();

</script>
