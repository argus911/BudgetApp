function n(v){if(v===''||v===null||v===undefined)return'—';var x=parseFloat(v);if(isNaN(x))return'—';var a=Math.abs(x);if(a>=1e8)return(x/1e8).toFixed(1)+'億';if(a>=1e7)return(x/1e7).toFixed(0)+'K萬';if(a>=1e4)return(x/1e4).toFixed(1)+'萬';return x.toLocaleString('zh-TW')}
function nf(v){if(v===''||v===null||v===undefined)return'—';var x=parseFloat(v);return isNaN(x)?'—':x.toLocaleString('zh-TW')}
function pct(v){if(v===''||v===null||v===undefined)return'—';var x=parseFloat(v);return isNaN(x)?'—':x.toFixed(2)+'%'}
function rcls(r){var v=parseFloat(r);if(isNaN(v))return'';return v>=100?'neg':v>=90?'war':'goo'}
function pcls(r){var v=parseFloat(r);if(isNaN(v))return'n';return v>=100?'e':v>=90?'w':v<50?'g':'n'}
function bcls(r){var v=parseFloat(r);if(isNaN(v))return'';return v>=100?'e':v>=90?'w':v<50?'g':''}
function bdg(r){var v=parseFloat(r);if(isNaN(v))return'bb';return v>=90?'br':v>=70?'bo':'bg'}

function card(d){
  var r=parseFloat(d.cumrate)||0,p=Math.min(r,100);
  var rem=parseFloat(d.remain),rc2=isNaN(rem)?'':rem<0?'r':rem===0?'w':'g';
  var ov=parseFloat(d.amttm)>parseFloat(d.bgttm)?'r':'';
  return '<div class="card '+bcls(r)+'" onclick="det(''+d.subacc+'')">'+
    '<div class="ch"><div class="ct">'+(d.name||'—')+'</div>'+
    '<span class="badge '+bdg(r)+'">'+pct(r)+'</span></div>'+
    '<div class="cc">'+d.subacc+' · '+(d.unit||'—')+'</div>'+
    '<div class="cg">'+
      '<div class="ci"><div class="lb">本月預算數</div><div class="vl">'+n(d.bgttm)+'</div></div>'+
      '<div class="ci"><div class="lb">本月動支數</div><div class="vl '+ov+'">'+n(d.amttm)+'</div></div>'+
      '<div class="ci"><div class="lb">剩餘可動支數</div><div class="vl '+rc2+'">'+(isNaN(rem)?'—':n(rem))+'</div></div>'+
      '<div class="ci"><div class="lb">本年度預算</div><div class="vl">'+n(d.bgtty)+'</div></div>'+
    '</div>'+
    '<div class="pw"><div class="pl"><span>累計動支率</span><span>'+pct(r)+'</span></div>'+
    '<div class="pb"><div class="pf '+pcls(r)+'" style="width:'+p+'%"></div></div></div>'+
  '</div>'
}

  });
  var avg=rates.length?rates.reduce(function(s,v){return s+v},0)/rates.length:0;
  var ac=avg>=90?'var(--err)':avg>=70?'var(--warn)':'var(--ok)';
  document.getElementById('sg').innerHTML=
    '<div class="sc"><div class="sl">本年度預算合計</div><div class="sv">'+n(tb)+'</div><div class="su">元</div></div>'+
    '<div class="sc"><div class="sl">本月預算數合計</div><div class="sv">'+n(tm)+'</div><div class="su">元</div></div>'+
    '<div class="sc"><div class="sl">本月動支數合計</div><div class="sv">'+n(am)+'</div><div class="su">元</div></div>'+
    '<div class="sc"><div class="sl">平均年度動支率</div><div class="sv" style="color:'+ac+'">'+avg.toFixed(1)+'%</div><div class="su">共'+D.length+'筆</div></div>';

  var cats={};
  D.forEach(function(d){
    var c=d.unit||'—';
    if(!cats[c])cats[c]={bgt:0,rem:0,cnt:0};
    cats[c].bgt+=parseFloat(d.bgtty)||0;
    cats[c].rem+=parseFloat(d.remain)||0;
    cats[c].cnt++;
  });
  var keys=Object.keys(cats).sort(function(a,b){return cats[b].bgt-cats[a].bgt});
  var h='<div class="cs"><div class="cst">📂 各主管單位年度執行概況</div>';
  keys.forEach(function(nm){
    var d=cats[nm],spent=d.bgt-d.rem,rate=d.bgt>0?spent/d.bgt*100:0;
    var cl=rate>=90?'neg':rate>=70?'war':'goo';
    h+='<div class="cr" onclick="goUnit(''+nm+'')">'+
      '<div><div class="cn">'+nm+'</div><div class="ck">'+d.cnt+' 個明細帳</div></div>'+
      '<div style="text-align:right"><div class="cp '+cl+'">'+rate.toFixed(1)+'%</div>'+
      '<div class="ca">剩餘 '+n(d.rem)+'</div></div></div>';
  });
  h+='</div>';
  document.getElementById('ocats').innerHTML=h;
}

function goUnit(nm){
  document.querySelectorAll('.tb')[2].click();
  document.getElementById('uf').value=nm;
  byUnit(nm);
}

function fil(){
  var kw=(document.getElementById('kw').value||'').toLowerCase();
  var cf=document.getElementById('cf').value;
  var sf=document.getElementById('sf').value;
  var list=D.filter(function(d){
    return(!kw||d.subacc.toLowerCase().includes(kw)||(d.name||'').toLowerCase().includes(kw))&&
           (!cf||d.unit===cf);
  });
  if(sf==='rd')list.sort(function(a,b){return(parseFloat(b.cumrate)||0)-(parseFloat(a.cumrate)||0)});
  else if(sf==='ra')list.sort(function(a,b){return(parseFloat(a.cumrate)||0)-(parseFloat(b.cumrate)||0)});
  else if(sf==='ya')list.sort(function(a,b){return(parseFloat(a.remain)||0)-(parseFloat(b.remain)||0)});
  else if(sf==='yd')list.sort(function(a,b){return(parseFloat(b.remain)||0)-(parseFloat(a.remain)||0)});
  document.getElementById('rc').textContent='共 '+list.length+' 筆';
  document.getElementById('cl').innerHTML=list.map(card).join('');
  document.getElementById('nd').style.display=list.length?'none':'block';
}

function byUnit(u){
  var el=document.getElementById('ul');
  if(!u){el.innerHTML='';return}
  var list=D.filter(function(d){return d.unit===u});
  el.innerHTML='<div class="rc">'+u+' — '+list.length+' 筆</div>'+list.map(card).join('');
}

function buildAl(){
  var list=D.filter(function(d){return parseFloat(d.cumrate)>=90||parseFloat(d.remain)<0})
    .sort(function(a,b){return(parseFloat(b.cumrate)||0)-(parseFloat(a.cumrate)||0)});
  document.getElementById('al').innerHTML=list.length
    ?'<div class="rc">共 '+list.length+' 筆警示</div>'+list.map(card).join('')
    :'<div class="empty">🎉 目前無超支警示項目</div>';
}

function det(sub){
  var d=D.find(function(x){return x.subacc===sub});
  if(!d)return;
  var r=parseFloat(d.cumrate)||0,yr=parseFloat(d.yrrate)||0;
  var remcls=parseFloat(d.remain)<0?' style="color:var(--err)"':'';
  document.getElementById('mdl').innerHTML=
    '<div class="mt">'+(d.name||'—')+'</div>'+
    '<div class="mc">明細帳：'+d.subacc+' · '+(d.unit||'—')+'</div>'+
    '<div class="ms"><div class="mst">📅 本月執行</div>'+
      '<div class="mr2"><span class="l">本月預算數</span><span class="v">'+nf(d.bgttm)+' 元</span></div>'+
      '<div class="mr2"><span class="l">本月動支數</span><span class="v">'+nf(d.amttm)+' 元</span></div>'+
      '<div class="mr2"><span class="l">本月動支率%</span><span class="v">'+pct(d.mrate)+'</span></div>'+
      '<div class="mr2"><span class="l">本月餘額</span><span class="v">'+nf(d.mremain)+' 元</span></div></div>'+
    '<div class="ms"><div class="mst">📈 累計執行</div>'+
      '<div class="mr2"><span class="l">至本月累計預算數</span><span class="v">'+nf(d.bgtttm)+' 元</span></div>'+
      '<div class="mr2"><span class="l">累計動支率</span><span class="v '+rcls(r)+'">'+pct(r)+'</span></div></div>'+
    '<div class="ms"><div class="mst">🗓️ 年度概況</div>'+
      '<div class="mr2"><span class="l">本年度預算</span><span class="v">'+nf(d.bgtty)+' 元</span></div>'+
      '<div class="mr2"><span class="l">年度動支率</span><span class="v '+rcls(yr)+'">'+pct(yr)+'</span></div>'+
      '<div class="mr2"><span class="l">剩餘可動支數</span><span class="v"'+remcls+'>'+nf(d.remain)+' 元</span></div>'+
      (d.yoy!==''?'<div class="mr2"><span class="l">去年同期YoY%</span><span class="v '+(parseFloat(d.yoy)<0?'goo':'war')+'">'+pct(d.yoy)+'</span></div>':'')+
    '</div>'+
    (d.itemcode?'<div class="ms"><div class="mst">📌 考核項目</div>'+
      '<div class="mr2"><span class="l">項目代號</span><span class="v">'+d.itemcode+'</span></div>'+
      '<div class="mr2"><span class="l">項目摘要</span><span class="v">'+(d.itemdesc||'—')+'</span></div></div>':'')+
    '<button class="mcl" onclick="document.getElementById('ov').classList.remove('on')">關閉</button>';
  document.getElementById('ov').classList.add('on');
}

buildOv();
fil();
buildAl();
</script>
</body>
</html>
